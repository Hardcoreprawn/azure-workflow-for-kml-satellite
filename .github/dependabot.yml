# Dependabot configuration
# Keeps dependencies up to date via automated PRs.
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates

version: 2
updates:
  # Python dependencies (pip / pyproject.toml)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps"
    groups:
      azure-sdk:
        patterns:
          - "azure-*"
      geospatial:
        patterns:
          - "fiona"
          - "shapely"
          - "pyproj"
          - "rasterio"
          - "lxml"
          - "pystac-client"
      dev-tools:
        patterns:
          - "ruff"
          - "pyright"
          - "pytest*"
          - "pre-commit"
          - "respx"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
    groups:
      # Keep the coupled CodeQL action steps (init/autobuild/analyze/upload-sarif)
      # in a single PR. Bumping them individually desyncs the versions and fails
      # CodeQL with "Loaded a configuration file for version X, but running Y".
      codeql-action:
        patterns:
          - "github/codeql-action*"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"

  # Terraform / OpenTofu providers
  - package-ecosystem: "terraform"
    directory: "/infra"
    schedule:
      interval: "weekly"
      day: "monday"
    cooldown:
      default-days: 7
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "infra"
    commit-message:
      prefix: "infra"
