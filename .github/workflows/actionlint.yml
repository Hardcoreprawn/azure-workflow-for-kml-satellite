# ─────────────────────────────────────────────────────────────
# Actionlint — validate GitHub Actions workflow syntax in CI.
#
# Why this exists:
#   Workflow YAML was only linted locally via the pre-commit actionlint
#   hook. A workflow edit committed without pre-commit could reach main
#   with a syntax/expression error uncaught, and workflow-only PRs that
#   change base-image.yml / deploy.yml (which don't otherwise run on PRs)
#   got no validation. See #995 / epic #1004.
#
#   Runs on every PR (no path filter) so it can be a required check
#   without needing a docs-stub. Invokes `make lint-actions` — the same
#   command developers run locally via pre-commit — so the pinned version
#   and shellcheck suppressions (both in the Makefile) stay local == CI. #1080.
# ─────────────────────────────────────────────────────────────
name: Actionlint

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  actionlint:
    name: Actionlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      # Single route: `make lint-actions` is the same command developers run
      # locally (via pre-commit). The pinned actionlint version and shellcheck
      # suppressions both live in the Makefile, so local == CI and nothing can
      # drift. See #1080.
      - name: Lint workflows (make lint-actions)
        run: make lint-actions
