# ─────────────────────────────────────────────────────────────
# Base Image — Build, test, scan, and publish treesight-base
#
# Rebuilds weekly on Monday 05:00 UTC (before CI/security runs)
# and on any push that changes Dockerfile.base.
#
# Flow:
#   1. Build Dockerfile.base
#   2. Run container smoke tests (validates runtime components)
#   3. Trivy scan (CRITICAL + HIGH, blocks on findings)
#   4. Push to GHCR with :latest + :YYYYMMDD-<sha> tags
# ─────────────────────────────────────────────────────────────
name: Base Image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.base"
      - "scripts/container_smoke_test.py"
  schedule:
    # Daily 05:00 UTC — picks up upstream python:3.12-slim-bookworm rebuilds and
    # new Debian bookworm security fixes within ~24 h of release.
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: read
  packages: write          # push to GHCR
  security-events: write   # upload Trivy SARIF

jobs:
  build-test-push:
    name: Build, Test & Push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── Build ──────────────────────────────────────────────
      - name: Set image tags
        id: meta
        run: |
          source .github/image-config.env
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${BASE_IMAGE_REPO}"
          DATE_TAG="$(date -u +%Y%m%d)-${GITHUB_SHA::8}"
          echo "date_tag=${DATE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"
          echo "image_dated=${IMAGE_NAME}:${DATE_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build base image
        run: |
          docker build --no-cache \
            -f Dockerfile.base \
            -t "${{ steps.meta.outputs.image_latest }}" \
            -t "${{ steps.meta.outputs.image_dated }}" \
            .

      # ── Smoke tests ───────────────────────────────────────
      - name: Run container smoke tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/scripts:/scripts:ro" \
            "${{ steps.meta.outputs.image_latest }}" \
            python3 /scripts/container_smoke_test.py

      # ── Size gate ──────────────────────────────────────────
      - name: Check image size
        run: |
          SIZE_MB=$(docker image inspect "${{ steps.meta.outputs.image_latest }}" \
            --format '{{ .Size }}' | awk '{printf "%.0f", $1/1024/1024}')
          echo "Image size: ${SIZE_MB} MB"
          # Fail if image exceeds 1.2 GB — something went wrong with stripping
          if [ "$SIZE_MB" -gt 1200 ]; then
            echo "::error::Base image is ${SIZE_MB} MB — exceeds 1200 MB limit. Check Dockerfile.base stripping."
            exit 1
          fi

      # ── Security scan ──────────────────────────────────────
      - name: Trivy container scan
        uses: ./.github/actions/trivy-scan
        with:
          scan: image
          image: ${{ steps.meta.outputs.image_latest }}
          format: sarif
          output: trivy-base.sarif
          ignorefile: .trivyignore
          exit-code: "1"        # block on findings — base must be clean

      - name: Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: trivy-base.sarif
          category: trivy-base-image

      # ── Push to GHCR ───────────────────────────────────────
      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push base image
        run: |
          docker push "${{ steps.meta.outputs.image_latest }}"
          docker push "${{ steps.meta.outputs.image_dated }}"
          echo "### Base Image Published :package:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.image_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- \`${{ steps.meta.outputs.image_dated }}\`" >> "$GITHUB_STEP_SUMMARY"

  # ─────────────────────────────────────────────────────────────
  # Reconcile .trivyignore against the freshly published image.
  #
  # The build gate scans WITH .trivyignore and ignore-unfixed, so any
  # suppressed CVE that is still flagged is fix-available. Because the base
  # image was just rebuilt (apt-get upgrade), "still present" means no
  # installable fix exists yet → renew the expiry; "gone" means the fix
  # shipped → remove the suppression. Drift is healed via a reviewed bot PR,
  # never an auto-commit to main.
  # ─────────────────────────────────────────────────────────────
  reconcile-trivyignore:
    name: Reconcile .trivyignore
    runs-on: ubuntu-latest
    needs: build-test-push
    permissions:
      contents: write          # push the reconcile branch
      packages: read           # pull the published base image
      pull-requests: write     # open/update the reconcile PR
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Set image tag
        id: meta
        run: |
          source .github/image-config.env
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${BASE_IMAGE_REPO}"
          echo "image_latest=${IMAGE_NAME}:latest" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Scan WITHOUT .trivyignore so every still-fixable HIGH/CRITICAL finding
      # is visible to the reconciler. Non-blocking (exit-code 0) — the gate in
      # build-test-push already enforces the policy.
      - name: Trivy scan (no suppressions)
        uses: ./.github/actions/trivy-scan
        with:
          scan: image
          image: ${{ steps.meta.outputs.image_latest }}
          format: json
          output: trivy-noignore.json
          ignorefile: ""
          exit-code: "0"

      - name: Reconcile suppressions
        id: reconcile
        run: |
          python3 scripts/reconcile_trivyignore.py \
            --scan trivy-noignore.json --write | tee reconcile-summary.txt
          if git diff --quiet -- .trivyignore; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No .trivyignore drift — nothing to reconcile."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open reconciliation PR
        if: steps.reconcile.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH=chore/trivyignore-reconcile
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add .trivyignore
          git commit -m "chore(security): reconcile .trivyignore with fresh base image scan"
          git push -f origin "$BRANCH"
          {
            echo "Automated reconciliation of \`.trivyignore\` against the freshly"
            echo "built and published base image scan (HIGH/CRITICAL, fixable only)."
            echo
            echo '```'
            cat reconcile-summary.txt
            echo '```'
            echo
            echo "- **Removed** entries are CVEs no longer present after \`apt-get upgrade\` — the fix shipped."
            echo "- **Renewed** entries are still present with no installable fix; expiry extended."
            echo
            echo "Review and merge to keep suppressions honest. Generated by \`.github/workflows/base-image.yml\`."
          } > pr-body.md
          if gh pr view "$BRANCH" --json state --jq .state 2>/dev/null | grep -q OPEN; then
            echo "Reconcile PR already open — branch updated."
          else
            gh pr create --base main --head "$BRANCH" \
              --title "chore(security): reconcile .trivyignore with image scan" \
              --body-file pr-body.md
          fi
