# ─────────────────────────────────────────────────────────────
# CI — Lint, test, build on every push & PR
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  PYTHON_VERSION: "3.12"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - run: uv sync --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run pyright treesight/ blueprints/

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      AzureWebJobsStorage: "UseDevelopmentStorage=true"
      DEMO_VALET_TOKEN_SECRET: "ci-test-secret"  # pragma: allowlist secret
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - run: uv sync --all-extras
      - run: uv run pytest tests/ -v -m "not integration" --tb=short --cov=treesight --cov-report=xml
      - uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        if: always()
        with:
          name: coverage
          path: coverage.xml

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR (pull base image)
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build app image
        env:
          BASE_IMAGE: ghcr.io/${{ github.repository }}/treesight-base:latest
        run: |
          docker build \
            --build-arg BASE_IMAGE="${BASE_IMAGE}" \
            -t treesight:ci-check .

      - name: Run container smoke tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/scripts:/scripts:ro" \
            treesight:ci-check \
            python3 /scripts/container_smoke_test.py
