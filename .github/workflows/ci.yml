name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  fast-lint-type-unit:
    name: Fast Lint Type Unit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python and project dependencies
        run: uv sync --all-extras

      - name: Lint with ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Type check with pyright
        run: uv run pyright

      - name: Run unit tests
        run: |
          uv run pytest \
            tests/unit/test_health_endpoints.py \
            tests/unit/test_contact_form_endpoint.py \
            tests/unit/test_diagnostics_endpoint_auth.py \
            tests/unit/test_container_apps_spec.py \
            tests/unit/test_deploy_workflow.py \
            tests/unit/test_tofu_apply_workflow.py \
            tests/unit/test_base_image_strategy.py \
            tests/unit/test_ci_workflow_lanes.py \
            tests/unit/test_base_image_refresh_workflow.py \
            -v --tb=short

  native-geo-validation:
    name: Native Geo Validation
    runs-on: ubuntu-latest
    needs: fast-lint-type-unit

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install system dependencies (GDAL)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev libgeos-dev libproj-dev

      - name: Install Python and project dependencies
        run: uv sync --all-extras

      - name: Validate geospatial native imports
        run: uv run python -c "import rasterio, fiona, pyproj, shapely"

      - name: Run geospatial architecture tests
        run: |
          uv run pytest tests/unit -v --tb=short -m "not integration and not e2e"

      - name: Run integration tests
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: uv run pytest tests/integration -v --tb=short -m "integration"
