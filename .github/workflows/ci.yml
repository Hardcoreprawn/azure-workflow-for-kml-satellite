# ─────────────────────────────────────────────────────────────
# CI — Lint, test, build on every push & PR
# ─────────────────────────────────────────────────────────────
name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    # Include ready_for_review so promoting a draft (manual or via the
    # watchdog auto-promote) actually triggers CI. See #1003/#1004.
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  merge_group:

permissions:
  contents: read

concurrency:
  # Cancel superseded runs for the same ref on PRs; never cancel main runs.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  PYTHON_VERSION: "3.12"

jobs:
  # Resolve the published dev image to an immutable digest and check whether the
  # repo's uv.lock still matches the deps baked into it. Gate jobs then run
  # *inside* that exact digest, so `local == CI` is provably the same image.
  # Only image build/publish stays on the bare runner. See ADR 0005 / #1086.
  resolve-image:
    name: Resolve dev image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    outputs:
      image: ${{ steps.resolve.outputs.image }}
      stale: ${{ steps.resolve.outputs.stale }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve digest + staleness
        id: resolve
        run: |
          source .github/image-config.env
          OWNER="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE="ghcr.io/${OWNER}/${DEV_IMAGE_REPO}:latest"
          if ! docker pull "${IMAGE}"; then
            echo "::error::dev image ${IMAGE} not found on GHCR — publish it via the Dev Image workflow (#1085) before CI can consume it."
            exit 1
          fi
          DIGEST_REF=$(docker inspect --format '{{index .RepoDigests 0}}' "${IMAGE}")
          echo "image=${DIGEST_REF}" >> "$GITHUB_OUTPUT"
          # Staleness is advisory: a PR that changes uv.lock legitimately runs
          # before the image is rebuilt on merge. Report it and let gate jobs
          # `uv sync` the delta rather than deadlocking dependency PRs.
          if python3 scripts/check_dev_image_staleness.py --image "${IMAGE}"; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
            LOCK_NOTE="fresh — deps served straight from the image"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
            LOCK_NOTE="stale vs uv.lock — gate jobs will \`uv sync\` the delta"
          fi
          {
            echo "### Dev image"
            echo ""
            echo "- Digest: \`${DIGEST_REF}\`"
            echo "- Lock check: ${LOCK_NOTE}"
          } >> "$GITHUB_STEP_SUMMARY"

  lint:
    name: Lint
    needs: resolve-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.resolve-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      # Deps are baked into the dev image; `uv run` must not try to re-sync.
      UV_NO_SYNC: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Sync dependency delta (only if image is stale)
        if: needs.resolve-image.outputs.stale == 'true'
        run: uv sync --all-extras
      # Canonical lint lives in the Makefile (single source of truth shared
      # with local `make lint` / `make check`). See issue #962.
      - run: make lint

  test:
    name: Test
    needs: resolve-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    container:
      image: ${{ needs.resolve-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      AzureWebJobsStorage: "UseDevelopmentStorage=true"
      DEMO_VALET_TOKEN_SECRET: "ci-test-secret"  # pragma: allowlist secret
      CIAM_AUTHORITY: "https://canopex.ciamlogin.com"
      CIAM_TENANT_ID: "ci-test-tenant"
      CIAM_API_AUDIENCE: "api://ci-test-audience"
      # Deps are baked into the dev image; `uv run` must not try to re-sync.
      UV_NO_SYNC: "1"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
        with:
          # Full history so diff-cover can find the merge-base with the base branch.
          fetch-depth: 0
      - name: Sync dependency delta (only if image is stale)
        if: needs.resolve-image.outputs.stale == 'true'
        run: uv sync --all-extras
      # Canonical test command lives in the Makefile (matches local `make test`).
      - run: make test
      # Changed-lines test coverage — REPORT-ONLY for now (never fails the build).
      # Surfaces whether new/changed Python lines are covered by tests, enforcing
      # the test-first standing order without blocking existing work. Flip to a
      # required gate by removing `|| true` and wiring --fail-under. See #1042.
      - name: Changed-lines coverage (report-only)
        if: github.event_name == 'pull_request'
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags --depth=1 origin "+refs/heads/${BASE_REF}:refs/remotes/origin/${BASE_REF}" || true
          uv run diff-cover coverage.xml \
            --compare-branch "origin/${BASE_REF}" \
            --fail-under 80 \
            --markdown-report diff-cover.md || true
          {
            echo "## Changed-lines test coverage (report-only)"
            echo ""
            echo "Target: 80% of changed Python lines covered. This is informational"
            echo "until #1042 promotes it to a required gate."
            echo ""
            cat diff-cover.md 2>/dev/null || echo "_diff-cover produced no report (no changed Python lines)._"
          } >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: coverage
          path: coverage.xml

  integration:
    name: Integration (Azurite)
    needs: resolve-image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    # Runs the @pytest.mark.integration suite against a real Azurite instance.
    # Azurite needs --skipApiVersionCheck/--loose (the installed azure-storage
    # SDK negotiates an API version newer than Azurite ships, so every request
    # is otherwise rejected), which a GitHub `services:` container cannot pass
    # (no command override). So instead of a container job we drive docker
    # compose on the bare runner: the maintained `azurite` service carries the
    # correct flags + healthcheck, and the `ci-gate` service runs make test-int
    # INSIDE the resolved dev image on the same network — the exact same path as
    # local `make ci-local`. See #1086.
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6
      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # ci-gate runs inside the exact resolved dev image (by digest); the
      # azurite dependency is brought up healthy first via depends_on.
      - name: Integration tests (Azurite via docker compose)
        env:
          CI_GATE_IMAGE: ${{ needs.resolve-image.outputs.image }}
          STALE: ${{ needs.resolve-image.outputs.stale }}
        run: |
          if [ "${STALE}" = "true" ]; then
            # Image deps lag uv.lock (dependency PR before rebuild) — sync the
            # delta inside the gate first, mirroring the lint/test jobs.
            docker compose --profile ci run --rm ci-gate \
              sh -c "uv sync --all-extras && make test-int"
          else
            docker compose --profile ci run --rm ci-gate make test-int
          fi
      - name: Tear down compose
        if: always()
        run: docker compose --profile ci down -v --remove-orphans

  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: read         # pull base image from GHCR
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Log in to GHCR (pull base image)
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve base image
        id: base
        run: |
          source .github/image-config.env
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${BASE_IMAGE_REPO}:latest"

          # Try to pull prebuilt base from GHCR; build locally on failure
          if docker pull "${GHCR_IMAGE}" 2>/dev/null; then
            echo "image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
            echo "### Base image: pulled from GHCR :package:" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Base image not found on GHCR — building from Dockerfile.base"
            LOCAL_TAG="treesight-base:ci-local"
            docker build -f Dockerfile.base -t "${LOCAL_TAG}" .
            echo "image=${LOCAL_TAG}" >> "$GITHUB_OUTPUT"
            echo "### Base image: built locally from Dockerfile.base :hammer:" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build app image
        run: |
          APP_VERSION=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml)
          docker build \
            --build-arg BASE_IMAGE="${{ steps.base.outputs.image }}" \
            --build-arg APP_VERSION="${APP_VERSION}" \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t treesight:ci-check .

      - name: Run container smoke tests
        run: |
          docker run --rm \
            -e CIAM_AUTHORITY="https://canopex.ciamlogin.com" \
            -e CIAM_TENANT_ID="ci-test-tenant" \
            -e CIAM_API_AUDIENCE="api://ci-test-audience" \
            -v "${{ github.workspace }}/scripts:/scripts:ro" \
            treesight:ci-check \
            python3 /scripts/container_smoke_test.py
