# Automatically delete feature branches after merge to main
#
# Triggered when a PR to main is closed. If the PR was merged,
# deletes the source branch to keep the repository clean.
#
# References:
#   Issue #106 (ROADMAP Phase 3)
#   GitHub Actions: pull_request.closed event
#   GitHub API: push with --delete ref

name: Cleanup merged branches

on:
  pull_request:
    branches: [main]
    types: [closed]

permissions:
  contents: write

jobs:
  delete-merged-branch:
    name: Delete merged branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Delete branch if PR was merged
        if: github.event.pull_request.merged == true
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          git push origin --delete "$BRANCH_NAME"
        continue-on-error: true
