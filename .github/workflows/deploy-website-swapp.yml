---
# ---------------------------------------------------------------------------
# TreeSight Website Deployment to Azure Static Web Apps
# ---------------------------------------------------------------------------
# Deploys the HTML/CSS/JS landing page to Azure Static Web Apps.
# Triggered on push to main when website/ changes.
#
# Stack: HTML5, CSS3, vanilla JavaScript (no build required)
# Deployment: Azure Static Web Apps
# Architecture: website/ → SWAPP (staticwebapp.config.json handles routing)
#
# Deployment Flow:
# 1. Checkout code
# 2. Azure Login (OIDC)
# 3. Retrieve SWAPP deployment token
# 4. Upload website/ directly to SWAPP
# 5. Poll for 200 OK response (Margaret Hamilton principle)
# 6. Report live URL
#
# Requires:
#   - Azure Static Web App resource exists (created by tofu-apply.yml)
#   - GitHub environment secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID,
#     AZURE_SUBSCRIPTION_ID
# ---------------------------------------------------------------------------

name: Deploy Website to Static Web Apps

on:
  push:
    branches: [main]
    paths:
      - "website/**"
      - ".github/workflows/deploy-website-swapp.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-kmlsat-dev
  STATIC_WEB_APP_NAME: stapp-kmlsat-dev-site
  FUNCTION_APP_NAME: func-kmlsat-dev

jobs:
  deploy:
    name: Deploy Website
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for website directory
        id: website-check
        shell: bash
        run: |
          set -euo pipefail
          if [[ -d website ]]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "✅ Website directory found"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "::notice::website/ directory not found. Skipping deployment."
            exit 0
          fi

      - name: Azure Login (OIDC)
        if: steps.website-check.outputs.exists == 'true'
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Function App hostname
        id: function-app
        if: steps.website-check.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          HOSTNAME=$(az functionapp show \
            --name "$FUNCTION_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "defaultHostName" -o tsv)
          echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"
          echo "Function App hostname: ${HOSTNAME}"

      - name: Verify backend API contract compatibility
        if: steps.website-check.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail

          REQUIRED_API_VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          app_js = Path("website/static/app.js").read_text(encoding="utf-8")
          match = re.search(r"REQUIRED_API_CONTRACT_VERSION\s*=\s*'([^']+)'", app_js)
          if not match:
            raise SystemExit("REQUIRED_API_CONTRACT_VERSION not found in website/static/app.js")
          print(match.group(1))
          PY
          )

          API_CONTRACT_URL="https://${{ steps.function-app.outputs.hostname }}/api/api-contract"
          HEALTH_URL="https://${{ steps.function-app.outputs.hostname }}/api/health"
          READINESS_URL="https://${{ steps.function-app.outputs.hostname }}/api/readiness"
          MAX_ATTEMPTS=5
          ATTEMPT=0
          BACKOFF=5
          only_404_window=1
          observed_probe=0

          while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
            ATTEMPT=$((ATTEMPT + 1))
            START_MS=$(date +%s%3N)

            set +e
            API_CONTRACT_RESPONSE=$(curl -fsS --max-time 20 -w "\n%{http_code}" "$API_CONTRACT_URL" 2>/dev/null)
            CURL_EXIT=$?
            set -e

            END_MS=$(date +%s%3N)
            ELAPSED_MS=$((END_MS - START_MS))
            HTTP_STATUS=$(echo "$API_CONTRACT_RESPONSE" | tail -1)
            BODY=$(echo "$API_CONTRACT_RESPONSE" | head -n -1)
            observed_probe=1

            if [[ "$HTTP_STATUS" != "404" ]]; then
              only_404_window=0
            fi

            echo "contract-check attempt=${ATTEMPT}/${MAX_ATTEMPTS} curl_exit=${CURL_EXIT} http=${HTTP_STATUS} elapsed=${ELAPSED_MS}ms endpoint=${API_CONTRACT_URL}"

            # Transient transport failure (timeout=28, connect=7, DNS=6): retry with backoff
            if [[ $CURL_EXIT -eq 28 || $CURL_EXIT -eq 7 || $CURL_EXIT -eq 6 ]]; then
              echo "::warning::Attempt ${ATTEMPT}: transient transport error (curl exit ${CURL_EXIT}). Retrying in ${BACKOFF}s..."
              if [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; then
                sleep $BACKOFF
                BACKOFF=$((BACKOFF * 2))
              fi
              continue
            fi

            # Contract route can stay 404 for a short startup window while Functions are still indexing.
            if [[ $CURL_EXIT -eq 22 && "$HTTP_STATUS" == "404" ]]; then
              echo "::warning::Attempt ${ATTEMPT}: API contract endpoint returned 404. Treating as transient startup window and retrying in ${BACKOFF}s..."
              if [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; then
                sleep $BACKOFF
                BACKOFF=$((BACKOFF * 2))
              fi
              continue
            fi

            # Non-transport curl failure (e.g. TLS, bad status): retry
            if [[ $CURL_EXIT -ne 0 ]]; then
              echo "::warning::Attempt ${ATTEMPT}: curl failed (exit ${CURL_EXIT} http ${HTTP_STATUS}). Retrying in ${BACKOFF}s..."
              if [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; then
                sleep $BACKOFF
                BACKOFF=$((BACKOFF * 2))
              fi
              continue
            fi

            LIVE_API_VERSION=$(echo "$BODY" | jq -r '.api_version // empty')

            if [[ -z "$LIVE_API_VERSION" ]]; then
              echo "::error::Backend API contract endpoint did not return api_version (non-JSON or empty response)"
              exit 1
            fi

            # Hard-fail on version mismatch — no retry, this is a contract violation
            if [[ "$LIVE_API_VERSION" != "$REQUIRED_API_VERSION" ]]; then
              echo "::error::Backend API contract version mismatch: website requires ${REQUIRED_API_VERSION}, backend is ${LIVE_API_VERSION}"
              exit 1
            fi

            echo "✅ API contract compatible (${LIVE_API_VERSION}) on attempt ${ATTEMPT}"
            exit 0
          done

          if [[ "$observed_probe" == "1" && "$only_404_window" == "1" ]]; then
            HEALTH_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$HEALTH_URL" 2>/dev/null || echo "000")
            READINESS_STATUS=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 10 "$READINESS_URL" 2>/dev/null || echo "000")
            echo "::error::API contract endpoint persisted 404 across ${MAX_ATTEMPTS} attempts. health=${HEALTH_STATUS} readiness=${READINESS_STATUS}. Likely backend image/route is outdated; deploy backend before website."
            exit 1
          fi

          echo "::error::API contract check failed after ${MAX_ATTEMPTS} attempts (all transport errors)"
          exit 1

      - name: Configure website backend fallback origin
        if: steps.website-check.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          export FUNCTION_APP_ORIGIN="https://${{ steps.function-app.outputs.hostname }}"
          export WEBSITE_BUILD_VERSION="${GITHUB_SHA::7}"
          python - <<'PY'
          import os
          from pathlib import Path

          app_js_path = Path("website/static/app.js")
          app_js_content = app_js_path.read_text(encoding="utf-8")
          app_js_updated = app_js_content.replace(
            "__FUNCTION_APP_ORIGIN__", os.environ["FUNCTION_APP_ORIGIN"]
          )

          if app_js_content == app_js_updated:
            raise SystemExit(
              "Expected website/static/app.js to contain __FUNCTION_APP_ORIGIN__ placeholder"
            )

          app_js_path.write_text(app_js_updated, encoding="utf-8")

          index_path = Path("website/index.html")
          index_content = index_path.read_text(encoding="utf-8")
          index_updated = index_content.replace(
            "__WEBSITE_BUILD_VERSION__", os.environ["WEBSITE_BUILD_VERSION"]
          )

          if index_content == index_updated:
            raise SystemExit(
              "Expected website/index.html to contain __WEBSITE_BUILD_VERSION__ placeholder"
            )

          index_path.write_text(index_updated, encoding="utf-8")
          PY
          echo "Configured website backend fallback origin: ${FUNCTION_APP_ORIGIN}"
          echo "Configured website asset version: ${WEBSITE_BUILD_VERSION}"

      - name: Get Static Web App deployment token
        id: token
        if: steps.website-check.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          TOKEN=$(az staticwebapp secrets list \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.apiKey" -o tsv)
          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"
          echo "Retrieved deployment token"

      - name: Deploy website to Azure Static Web Apps
        if: steps.website-check.outputs.exists == 'true'
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.token.outputs.token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: "upload"
          app_location: "website"
          skip_app_build: true

      - name: Get Static Web App hostname
        id: hostname
        if: steps.website-check.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail
          HOSTNAME=$(az staticwebapp show \
            --name "$STATIC_WEB_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "defaultHostname" -o tsv)
          echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"
          echo "Static Web App hostname: ${HOSTNAME}"

      - name: Verify site is live (poll with timeout)
        if: steps.website-check.outputs.exists == 'true'
        shell: bash
        run: |
          set -euo pipefail

          SITE_URL="https://${{ steps.hostname.outputs.hostname }}"
          MAX_ATTEMPTS=30
          ATTEMPT=0

          echo "::group::Polling for site availability"
          echo "Target: ${SITE_URL}"

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            set +e
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "${SITE_URL}" 2>/dev/null)
            CURL_EXIT=$?
            set -e

            if [[ $CURL_EXIT -eq 0 ]] && [[ "$HTTP_STATUS" == "200" ]]; then
              echo "✅ Site is live (HTTP 200)"
              echo "::endgroup::"
              echo ""
              echo "========================================="
              echo "✅ DEPLOYMENT SUCCESSFUL"
              echo "========================================="
              echo "TreeSight: ${SITE_URL}"
              echo "Backend fallback: https://${{ steps.function-app.outputs.hostname }}"
              echo "========================================="
              exit 0
            fi

            echo "⏳ Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: HTTP ${HTTP_STATUS} (curl exit: ${CURL_EXIT}). Retrying in 10s..."
            sleep 10
          done

          echo "::endgroup::"
          echo "⚠️  Site deployed but not yet responding after ${MAX_ATTEMPTS} attempts"
          echo "Site URL: ${SITE_URL}"
          echo "Note: CDN propagation may take additional time. The site should be available shortly."
          exit 0
