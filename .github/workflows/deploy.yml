# ─────────────────────────────────────────────────────────────
# Deploy — Build, push to ACR, deploy infra & app
#
# Triggered on push to main (after CI passes) or manually.
#
# Required GitHub secrets:
#   AZURE_CLIENT_ID        — Service principal app ID
#   AZURE_TENANT_ID        — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID  — Target subscription
#   AZURE_CREDENTIALS      — Service principal credentials JSON (for az login)
#   DEMO_VALET_TOKEN_SECRET — Valet token signing key
#   BUDGET_CONTACT_EMAIL    — Email for cost alerts
#   SWA_DEPLOYMENT_TOKEN    — Static Web App deployment token (from infra output)
# ─────────────────────────────────────────────────────────────
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-prod
  cancel-in-progress: false

env:
  TOFU_VERSION: "1.8.0"

jobs:
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      acr_login_server: ${{ steps.outputs.outputs.acr_login_server }}
      acr_name: ${{ steps.outputs.outputs.acr_name }}
      resource_group: ${{ steps.outputs.outputs.resource_group }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Tofu Init
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: tofu init

      - name: Tofu Plan
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          TF_VAR_demo_valet_token_secret: ${{ secrets.DEMO_VALET_TOKEN_SECRET }}
          TF_VAR_budget_contact_email: ${{ secrets.BUDGET_CONTACT_EMAIL }}
          TF_VAR_docker_image_tag: ${{ github.sha }}
        run: tofu plan -out=tfplan

      - name: Tofu Apply
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: tofu apply -auto-approve tfplan

      - name: Export outputs
        id: outputs
        working-directory: infra
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          echo "acr_login_server=$(tofu output -raw acr_login_server)" >> "$GITHUB_OUTPUT"
          echo "acr_name=$(tofu output -raw acr_name)" >> "$GITHUB_OUTPUT"
          echo "resource_group=$(tofu output -raw resource_group_name)" >> "$GITHUB_OUTPUT"

  deploy-functions:
    name: Build & Push Functions Container
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: ACR Login
        run: az acr login --name ${{ needs.deploy-infra.outputs.acr_name }}

      - name: Build & Push
        run: |
          IMAGE="${{ needs.deploy-infra.outputs.acr_login_server }}/treesight:${{ github.sha }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"
          # Also tag as latest
          docker tag "$IMAGE" "${{ needs.deploy-infra.outputs.acr_login_server }}/treesight:latest"
          docker push "${{ needs.deploy-infra.outputs.acr_login_server }}/treesight:latest"

  deploy-website:
    name: Deploy Static Website
    runs-on: ubuntu-latest
    needs: deploy-infra
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /website
          skip_app_build: true
          skip_api_build: true
