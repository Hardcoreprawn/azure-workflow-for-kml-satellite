# ─────────────────────────────────────────────────────────────
# Deploy — Infra (OpenTofu) → Container image (GHCR) → Static site
#
# Triggered when CI passes on main, or manually.
#
# Required GitHub Secrets (set in 'dev' environment):
#   AZURE_CLIENT_ID         — SP / managed identity client ID (OIDC)
#   AZURE_TENANT_ID         — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID   — Target subscription
#   TF_STATE_RESOURCE_GROUP — Resource group holding tfstate storage
#   TF_STATE_STORAGE_ACCOUNT— Storage account name for tfstate
#   TF_STATE_CONTAINER      — Blob container name for tfstate
#   TF_STATE_KEY            — Blob key for the state file
#   SWA_DEPLOYMENT_TOKEN    — Static Web App deployment token
# ─────────────────────────────────────────────────────────────
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  packages: write          # push to GHCR
  security-events: write   # upload Trivy SARIF

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  TOFU_VERSION: "1.8.0"

jobs:
  # ── 1. Build & push container to GHCR ──────────────────────
  build-image:
    name: Build & Push Container
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      image_uri: ${{ steps.meta.outputs.image_uri }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY,,}/treesight"
          TAG="${{ github.sha }}"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"

      - name: Build & push
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
          BASE_IMAGE: ghcr.io/${{ github.repository }}/treesight-base:latest
        run: |
          docker build \
            --build-arg BASE_IMAGE="${BASE_IMAGE}" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:latest" .
          docker push "${IMAGE_NAME}:${{ github.sha }}"
          docker push "${IMAGE_NAME}:latest"

      - name: Run container smoke tests
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/scripts:/scripts:ro" \
            "${IMAGE_NAME}:${{ github.sha }}" \
            python3 /scripts/container_smoke_test.py

      - name: Trivy container scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ steps.meta.outputs.image_uri }}
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"        # warn, don't block deploy (set to "1" to gate)

      - name: Upload Trivy image SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@480db559a14342288b67e54bd959dd52dc3ee68f # v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ── 2. Deploy infrastructure with OpenTofu ─────────────────
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-image
    environment: dev
    outputs:
      function_app_hostname: ${{ steps.hostname.outputs.hostname }}
      appinsights_connection_string: ${{ steps.appinsights.outputs.connection_string }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Azure Login (OIDC)
        uses: azure/login@1384c340ab2dda50fed2bee3041d1d87018aa5e8 # v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@9d84900f3238fab8cd84ce47d658d25dd008be2f # v1
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Cache OpenTofu providers
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: infra/tofu/.terraform/providers
          key: tofu-providers-${{ hashFiles('infra/tofu/.terraform.lock.hcl') }}
          restore-keys: tofu-providers-

      - name: Tofu Init
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "tofu init attempt ${attempt}/${MAX_RETRIES}"
            if tofu init \
              -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
              -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
              -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER_DEV }}" \
              -backend-config="key=${{ secrets.TF_STATE_KEY_DEV }}"; then
              echo "✅ tofu init succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "⚠️ tofu init failed, retrying in 10s..."
              sleep 10
            fi
          done
          echo "❌ tofu init failed after ${MAX_RETRIES} attempts"
          exit 1

      - name: Tofu Plan
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          tofu plan -out=tfplan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="container_image=${{ needs.build-image.outputs.image_uri }}" \
            -var-file="environments/dev.tfvars"

      - name: Tofu Apply
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: tofu apply -auto-approve tfplan

      # azapi v2 crashes when updating the function app body (identity bug).
      # So tofu ignores body changes and we apply mutable config via CLI.
      - name: Configure Function App
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          FUNC_RG=$(tofu output -raw resource_group_name)
          FUNC_NAME=$(tofu output -raw function_app_name)

          az functionapp config container set \
            --name "$FUNC_NAME" \
            --resource-group "$FUNC_RG" \
            --image "${{ needs.build-image.outputs.image_uri }}"

          # Read CIAM config from tfvars (body is ignore_changes in tofu)
          CIAM_TENANT=$(grep 'ciam_tenant_name' environments/dev.tfvars | sed 's/.*= *"\(.*\)"/\1/')
          CIAM_CLIENT=$(grep 'ciam_client_id' environments/dev.tfvars | sed 's/.*= *"\(.*\)"/\1/')

          # Set REQUIRE_AUTH based on environment (body is ignore_changes)
          ENV_NAME=$(grep -oP '(?<=environment\s{0,10}=\s{0,10}")\w+' environments/dev.tfvars || echo "dev")
          REQUIRE_AUTH=""
          if [ "$ENV_NAME" = "prd" ]; then REQUIRE_AUTH="true"; fi

          az webapp config appsettings set \
            --name "$FUNC_NAME" \
            --resource-group "$FUNC_RG" \
            --settings \
              WEBSITES_ENABLE_APP_SERVICE_STORAGE=false \
              CIAM_TENANT_NAME="$CIAM_TENANT" \
              CIAM_CLIENT_ID="$CIAM_CLIENT" \
              CIAM_AUDIENCE="$CIAM_CLIENT" \
              REQUIRE_AUTH="$REQUIRE_AUTH"

          # Apply scaling cap (body is ignore_changes in tofu)
          MAX_INSTANCES=$(grep -oP '(?<=function_max_instances\s{0,10}=\s{0,10})\d+' environments/dev.tfvars 2>/dev/null || echo "3")
          : "${MAX_INSTANCES:=3}"
          FUNC_ID=$(az functionapp show --name "$FUNC_NAME" --resource-group "$FUNC_RG" --query id -o tsv)
          az rest --method PATCH \
            --url "${FUNC_ID}?api-version=2024-04-01" \
            --body "{\"properties\":{\"functionAppConfig\":{\"scaleAndConcurrency\":{\"maximumInstanceCount\":${MAX_INSTANCES}}}}}"

      - name: Export Function App hostname
        id: hostname
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          HOSTNAME=$(tofu output -raw function_app_default_hostname)
          echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"

      - name: Export App Insights connection string
        id: appinsights
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          echo "connection_string=$(tofu output -raw appinsights_connection_string)" >> "$GITHUB_OUTPUT"

      - name: Verify runtime readiness
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          HOSTNAME=$(tofu output -raw function_app_default_hostname)
          BASE_URL="https://${HOSTNAME}"
          MAX_WAIT=360          # 6 minutes — generous for Container Apps cold start
          INTERVAL=10
          elapsed=0
          health_code=0
          ready_code=0

          echo "Waiting for ${BASE_URL}/api/health to become ready..."

          while [ $elapsed -lt $MAX_WAIT ]; do
            health_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${BASE_URL}/api/health" 2>/dev/null || echo "000")
            ready_code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${BASE_URL}/api/readiness" 2>/dev/null || echo "000")

            echo "  [${elapsed}s] health=${health_code} readiness=${ready_code}"

            # Success: both return 200
            if [ "$health_code" = "200" ] && [ "$ready_code" = "200" ]; then
              echo "✅ Runtime is healthy and ready."
              exit 0
            fi

            # Fail fast on server errors (5xx) — indicates a real crash
            if [[ "$health_code" =~ ^5 ]] || [[ "$ready_code" =~ ^5 ]]; then
              echo "❌ Server error detected (health=${health_code}, readiness=${ready_code}). Failing."
              exit 1
            fi

            # 404 / 000 / other — likely routing lag, keep waiting
            sleep $INTERVAL
            elapsed=$((elapsed + INTERVAL))
          done

          # Final diagnostics
          echo ""
          echo "❌ Readiness checks did not pass within ${MAX_WAIT}s."
          echo "── Endpoint probe matrix ──"
          echo "  health:    ${health_code}"
          echo "  readiness: ${ready_code}"
          echo "  elapsed:   ${elapsed}s"
          echo ""
          echo "This may indicate:"
          echo "  - Container image failed to start (check Container Apps logs)"
          echo "  - Route registration lag exceeded timeout"
          echo "  - The function app hostname has changed"
          exit 1

  # ── 3. Deploy static website ───────────────────────────────
  deploy-website:
    name: Deploy Static Website
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Inject API config
        run: |
          cat > website/api-config.json <<EOF
          {"apiBase": "https://${{ needs.deploy-infra.outputs.function_app_hostname }}", "lastVerified": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF

      - name: Inject analytics config
        env:
          AI_CONNECTION_STRING: ${{ needs.deploy-infra.outputs.appinsights_connection_string }}
        run: |
          if [ -n "$AI_CONNECTION_STRING" ]; then
            find website -name '*.html' -exec sed -i \
              's|name="ai-connection-string" content=""|name="ai-connection-string" content="'"$AI_CONNECTION_STRING"'"|' {} +
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /website
          skip_app_build: true
          skip_api_build: true
