# ─────────────────────────────────────────────────────────────
# Deploy — Infra (OpenTofu) → Container image (GHCR) → Static site
#
# Triggered when CI passes on main, or manually.
# The same immutable container image is built once and can be
# promoted to any environment by re-running with a different
# `environment` input.
#
# Required GitHub Secrets (set per GitHub Environment):
#   AZURE_CLIENT_ID         — SP / managed identity client ID (OIDC)
#   AZURE_TENANT_ID         — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID   — Target subscription
#   TF_STATE_RESOURCE_GROUP — Resource group holding tfstate storage
#   TF_STATE_STORAGE_ACCOUNT— Storage account name for tfstate
#   TF_STATE_CONTAINER      — Blob container for this environment
#   TF_STATE_KEY            — Blob key for the state file
#   SWA_DEPLOYMENT_TOKEN    — Static Web App deployment token
#
# ─────────────────────────────────────────────────────────────
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (must match a GitHub Environment and a tfvars file)
        required: true
        type: choice
        options:
          - dev
          - prd
        default: dev
      image_tag:
        description: 'Container image tag to deploy (default: latest main SHA)'
        required: false
        type: string
      rebuild_after_manual_teardown:
        description: Recreate after app-managed resources were deleted manually outside the workflow.
        required: false
        type: boolean
        default: false
      smoke_poll_interval_seconds:
        description: Poll interval (seconds) for post-readiness async smoke gate.
        required: false
        type: string
        default: "5"
      smoke_max_attempts:
        description: Max orchestrator poll attempts for post-readiness async smoke gate.
        required: false
        type: string
        default: "60"

permissions:
  contents: read
  id-token: write
  packages: write          # push to GHCR
  security-events: write   # upload Trivy SARIF

concurrency:
  group: deploy-${{ inputs.environment || 'dev' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TOFU_VERSION: "1.8.0"
  # Resolve environment: workflow_dispatch supplies it; workflow_run always deploys to dev.
  DEPLOY_ENV: ${{ inputs.environment || 'dev' }}

jobs:
  # ── 1. Build & push container to GHCR ──────────────────────
  # When promoting an existing image (image_tag input set), this job
  # resolves the URI without rebuilding.
  build-image:
    name: Build & Push Container
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      image_uri: ${{ steps.resolve.outputs.image_uri || steps.meta.outputs.image_uri }}
      orch_image_uri: ${{ steps.resolve-orch.outputs.orch_image_uri || steps.orch-meta.outputs.orch_image_uri }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── Guard: prd must promote an existing image ──────────
      - name: Require image_tag for production
        if: ${{ inputs.environment == 'prd' && inputs.image_tag == '' }}
        run: |
          echo "::error::Production deploys must promote an existing image. Provide image_tag."
          exit 1

      # ── Promotion path: reuse an existing GHCR image ────────
      - name: Resolve existing image for promotion
        id: resolve
        if: ${{ inputs.image_tag != '' }}
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          source .github/image-config.env
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_IMAGE_REPO}"
          echo "image_uri=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "### ♻️ Promoting existing image: \`${IMAGE_NAME}:${IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve existing orchestrator image for promotion
        id: resolve-orch
        if: ${{ inputs.image_tag != '' }}
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          source .github/image-config.env
          ORCH_IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${ORCH_IMAGE_REPO}"
          echo "orch_image_uri=${ORCH_IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      # ── Normal path: build fresh image ──────────────────────
      - name: Log in to GHCR
        if: ${{ inputs.image_tag == '' }}
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        if: ${{ inputs.image_tag == '' }}
        id: meta
        run: |
          source .github/image-config.env
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_IMAGE_REPO}"
          ORCH_IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${ORCH_IMAGE_REPO}"
          TAG="${{ github.sha }}"
          APP_VERSION=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml)
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "orch_image_name=${ORCH_IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "orch_image_uri=${ORCH_IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set orchestrator image metadata
        if: ${{ inputs.image_tag == '' }}
        id: orch-meta
        run: |
          source .github/image-config.env
          ORCH_IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${ORCH_IMAGE_REPO}"
          echo "orch_image_uri=${ORCH_IMAGE_NAME}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Resolve base image
        if: ${{ inputs.image_tag == '' }}
        id: base
        run: |
          source .github/image-config.env
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${BASE_IMAGE_REPO}:latest"

          if docker pull "${GHCR_IMAGE}" 2>/dev/null; then
            echo "image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
            echo "### Base image: pulled from GHCR :package:" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Base image not found on GHCR — building from Dockerfile.base"
            LOCAL_TAG="treesight-base:ci-local"
            docker build -f Dockerfile.base -t "${LOCAL_TAG}" .
            echo "image=${LOCAL_TAG}" >> "$GITHUB_OUTPUT"
            echo "### Base image: built locally from Dockerfile.base :hammer:" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build image
        if: ${{ inputs.image_tag == '' }}
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
        run: |
          docker build \
            --build-arg BASE_IMAGE="${{ steps.base.outputs.image }}" \
            --build-arg APP_VERSION="${{ steps.meta.outputs.app_version }}" \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:${{ steps.meta.outputs.app_version }}" \
            -t "${IMAGE_NAME}:latest" .

      - name: Build orchestrator image
        if: ${{ inputs.image_tag == '' }}
        env:
          ORCH_IMAGE_NAME: ${{ steps.meta.outputs.orch_image_name }}
        run: |
          docker build \
            -f Dockerfile.orchestrator \
            --build-arg BASE_IMAGE="${{ steps.base.outputs.image }}" \
            --build-arg APP_VERSION="${{ steps.meta.outputs.app_version }}" \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t "${ORCH_IMAGE_NAME}:${{ github.sha }}" \
            -t "${ORCH_IMAGE_NAME}:${{ steps.meta.outputs.app_version }}" \
            -t "${ORCH_IMAGE_NAME}:latest" .

      - name: Run container smoke tests
        if: ${{ inputs.image_tag == '' }}
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
        run: |
          docker run --rm \
            -v "${{ github.workspace }}/scripts:/scripts:ro" \
            "${IMAGE_NAME}:${{ github.sha }}" \
            python3 /scripts/container_smoke_test.py

      - name: Push to GHCR
        if: ${{ inputs.image_tag == '' }}
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
          ORCH_IMAGE_NAME: ${{ steps.meta.outputs.orch_image_name }}
        run: |
          docker push "${IMAGE_NAME}:${{ github.sha }}"
          docker push "${IMAGE_NAME}:${{ steps.meta.outputs.app_version }}"
          docker push "${IMAGE_NAME}:latest"
          docker push "${ORCH_IMAGE_NAME}:${{ github.sha }}"
          docker push "${ORCH_IMAGE_NAME}:${{ steps.meta.outputs.app_version }}"
          docker push "${ORCH_IMAGE_NAME}:latest"

      - name: Trivy container scan (single pass to JSON)
        id: trivy-scan
        if: ${{ inputs.image_tag == '' }}
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          version: v0.70.0
          cache: false
          image-ref: ${{ steps.meta.outputs.image_uri }}
          scanners: vuln
          format: json
          output: trivy-image.json
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          trivyignores: .trivyignore
          exit-code: "0"        # gate explicitly from JSON so SARIF and gate share one scan result

      - name: Convert Trivy JSON to SARIF
        if: ${{ inputs.image_tag == '' }}
        run: |
          trivy convert --format sarif --output trivy-image.sarif trivy-image.json

      - name: Fail on HIGH/CRITICAL findings
        if: ${{ inputs.image_tag == '' }}
        run: |
          findings=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH")] | length' trivy-image.json)
          if [ "${findings}" -gt 0 ]; then
            echo "::error::Trivy found ${findings} HIGH/CRITICAL vulnerability findings after ignores."
            echo "Top findings:"
            jq -r '
              [.Results[]?.Vulnerabilities[]?]
              | sort_by(.Severity, .VulnerabilityID)
              | .[]
              | "- \(.Severity) \(.VulnerabilityID) pkg=\(.PkgName) installed=\(.InstalledVersion // \"unknown\") fixed=\(.FixedVersion // \"unfixed\")"
            ' trivy-image.json | head -30
            critical_count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-image.json)
            high_count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-image.json)
            echo "Summary: CRITICAL=${critical_count} HIGH=${high_count}"
            exit 1
          fi
          echo "Trivy found 0 HIGH/CRITICAL vulnerability findings."

      - name: Upload Trivy image SARIF
        if: ${{ always() && inputs.image_tag == '' && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ── 2. Deploy infrastructure with OpenTofu ─────────────────
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-image
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      TF_VAR_deploy_principal_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_auth_mode: bearer_only
      TF_VAR_ciam_authority: ${{ secrets.TF_VAR_CIAM_AUTHORITY || '' }}
      TF_VAR_ciam_tenant_id: ${{ secrets.TF_VAR_CIAM_TENANT_ID || '' }}
      TF_VAR_ciam_api_audience: ${{ secrets.TF_VAR_CIAM_API_AUDIENCE || '' }}
    outputs:
      function_app_orch_hostname: ${{ steps.hostname.outputs.hostname }}
      appinsights_connection_string: ${{ steps.appinsights.outputs.connection_string }}
      swa_hostname: ${{ steps.swa-hostname.outputs.hostname }}
      custom_domain: ${{ steps.swa-hostname.outputs.custom_domain }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Validate CIAM auth env wiring
        shell: bash
        run: |
          trim_space() {
            local value="${1-}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }
          set -euo pipefail
          mode="${TF_VAR_auth_mode:-bearer_only}"
          if [[ "$mode" != "bearer_only" ]]; then
            echo "Invalid TF_VAR_auth_mode='${mode}'. Expected bearer_only."
            exit 1
          fi
          ciam_authority="$(trim_space "${TF_VAR_ciam_authority:-}")"
          ciam_tenant_id="$(trim_space "${TF_VAR_ciam_tenant_id:-}")"
          ciam_api_audience="$(trim_space "${TF_VAR_ciam_api_audience:-}")"
          if [[ -z "$ciam_authority" || -z "$ciam_tenant_id" || -z "$ciam_api_audience" ]]; then
            echo "CIAM auth misconfigured: TF_VAR_auth_mode=${mode} requires TF_VAR_ciam_authority, TF_VAR_ciam_tenant_id, and TF_VAR_ciam_api_audience."
            exit 1
          fi

      - name: Cache OpenTofu providers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: infra/tofu/.terraform/providers
          key: tofu-providers-${{ hashFiles('infra/tofu/.terraform.lock.hcl') }}
          restore-keys: tofu-providers-

      - name: Resolve state backend secrets
        run: |
          if [ "${{ env.DEPLOY_ENV }}" == "prd" ]; then
            echo "TF_STATE_CONTAINER=${{ secrets.TF_STATE_CONTAINER_PRD }}" >> "$GITHUB_ENV"
            echo "TF_STATE_KEY=${{ secrets.TF_STATE_KEY_PRD }}" >> "$GITHUB_ENV"
          else
            echo "TF_STATE_CONTAINER=${{ secrets.TF_STATE_CONTAINER_DEV }}" >> "$GITHUB_ENV"
            echo "TF_STATE_KEY=${{ secrets.TF_STATE_KEY_DEV }}" >> "$GITHUB_ENV"
          fi

      - name: Tofu Init
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "tofu init attempt ${attempt}/${MAX_RETRIES}"
            if tofu init \
              -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
              -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
              -backend-config="container_name=$TF_STATE_CONTAINER" \
              -backend-config="key=$TF_STATE_KEY"; then
              echo "✅ tofu init succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "⚠️ tofu init failed, retrying in 10s..."
              sleep 10
            fi
          done
          echo "❌ tofu init failed after ${MAX_RETRIES} attempts"
          exit 1

      - name: Drop stale azapi state after manual teardown
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild_after_manual_teardown }}
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          STATE_LIST=$(tofu state list 2>/dev/null || true)
          for address in \
            azapi_resource.function_app \
            azapi_resource.event_grid_system_topic \
            azapi_resource_action.function_host_keys \
            azapi_resource.event_grid_subscription; do
            if printf '%s\n' "$STATE_LIST" | grep -Fx "$address" >/dev/null; then
              tofu state rm "$address"
            fi
          done

      - name: Tofu Plan
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          tofu plan -out=tfplan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="container_image=${{ needs.build-image.outputs.image_uri }}" \
            -var="orchestrator_image=${{ needs.build-image.outputs.orch_image_uri }}" \
            -var-file="environments/${{ env.DEPLOY_ENV }}.tfvars"

      - name: Tofu Apply
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: tofu apply -auto-approve tfplan

      # Capture current container images so we can rollback if the
      # new deployment fails readiness checks.
      - name: Capture current container images
        id: current-image
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          FUNC_RG=$(tofu output -raw resource_group_name)
          FUNC_NAME=$(tofu output -raw function_app_name)
          ORCH_NAME=$(tofu output -raw function_app_orch_name)

          CURRENT_COMPUTE_IMAGE=$(az functionapp config container show \
            --name "$FUNC_NAME" \
            --resource-group "$FUNC_RG" \
            --query '[?name==`DOCKER_CUSTOM_IMAGE_NAME`].value' -o tsv 2>/dev/null || echo "")

          CURRENT_ORCH_IMAGE=$(az functionapp config container show \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --query '[?name==`DOCKER_CUSTOM_IMAGE_NAME`].value' -o tsv 2>/dev/null || echo "")

          echo "image_compute=${CURRENT_COMPUTE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_orch=${CURRENT_ORCH_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "func_rg=${FUNC_RG}" >> "$GITHUB_OUTPUT"
          echo "func_name=${FUNC_NAME}" >> "$GITHUB_OUTPUT"
          echo "orch_name=${ORCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "Previous compute image: ${CURRENT_COMPUTE_IMAGE:-<none>}"
          echo "Previous orchestrator image: ${CURRENT_ORCH_IMAGE:-<none>}"

      - name: Capture current orchestrator container image
        id: current-orch-image
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          FUNC_RG=$(tofu output -raw resource_group_name)
          ORCH_NAME=$(tofu output -raw function_app_orch_name)
          CURRENT_IMAGE=$(az functionapp config container show \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --query '[?name==`DOCKER_CUSTOM_IMAGE_NAME`].value' -o tsv 2>/dev/null || echo "")
          echo "image=${CURRENT_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "func_rg=${FUNC_RG}" >> "$GITHUB_OUTPUT"
          echo "func_name=${ORCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "Previous orchestrator image: ${CURRENT_IMAGE:-<none>}"

      # azapi v2 crashes when updating the function app body (identity bug).
      # So tofu ignores body changes and we apply mutable config via CLI.
      - name: Configure Function App
        id: configure-app
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          FUNC_RG=$(tofu output -raw resource_group_name)
          FUNC_NAME=$(tofu output -raw function_app_name)

          az functionapp config container set \
            --name "$FUNC_NAME" \
            --resource-group "$FUNC_RG" \
            --image "${{ needs.build-image.outputs.image_uri }}"

          # Keep Terraform as the source of truth for CLI-managed settings while
          # the azapi identity bug still forces body ignore_changes on updates.
          mapfile -t APP_SETTINGS < <(
            tofu output -json function_app_cli_app_settings \
              | jq -r 'to_entries[] | "\(.key)=\(.value|tostring)"'
          )

          az webapp config appsettings set \
            --name "$FUNC_NAME" \
            --resource-group "$FUNC_RG" \
            --settings "${APP_SETTINGS[@]}"

          # Keep platform-level CORS in sync via CLI because tofu ignores body
          # updates on the Function App resource while the azapi identity bug exists.
          ALLOWED_ORIGINS_JSON=$(tofu output -json browser_allowed_origins | jq -c '.')
          if [ "$(echo "$ALLOWED_ORIGINS_JSON" | jq 'length')" -eq 0 ]; then
            echo "❌ Refusing to clear Function App CORS: browser_allowed_origins is empty"
            exit 1
          fi

          FUNC_ID=$(az functionapp show --name "$FUNC_NAME" --resource-group "$FUNC_RG" --query id -o tsv)
          CORS_BODY=$(jq -cn --argjson origins "$ALLOWED_ORIGINS_JSON" '{properties:{cors:{allowedOrigins:$origins,supportCredentials:false}}}')
          az rest --method PATCH \
            --url "${FUNC_ID}/config/web?api-version=2024-04-01" \
            --body "$CORS_BODY"

          # Apply scaling config from Terraform outputs (body is ignore_changes
          # in tofu due to the azapi identity bug).  Single PATCH to avoid 409
          # Conflict race between back-to-back updates on the same resource.
          MAX_INSTANCES=$(tofu output -raw function_app_cli_maximum_instance_count)
          MIN_INSTANCES=$(tofu output -raw function_app_cli_minimum_instance_count)
          if [ "$MIN_INSTANCES" -gt 0 ]; then
            ALWAYS_READY='[{"name":"http","instanceCount":'"${MIN_INSTANCES}"'}]'
          else
            ALWAYS_READY='[]'
          fi
          SCALE_BODY=$(jq -cn \
            --argjson max "$MAX_INSTANCES" \
            --argjson ready "$ALWAYS_READY" \
            '{properties:{functionAppConfig:{scaleAndConcurrency:{maximumInstanceCount:$max,alwaysReady:$ready}}}}')
          az rest --method PATCH \
            --url "${FUNC_ID}?api-version=2024-04-01" \
            --body "$SCALE_BODY"

          # Verify scaling config applied
          ACTUAL=$(az rest --method GET --url "${FUNC_ID}?api-version=2024-04-01" \
            | jq '{max: .properties.functionAppConfig.scaleAndConcurrency.maximumInstanceCount, alwaysReady: (.properties.functionAppConfig.scaleAndConcurrency.alwaysReady // [])}')
          echo "Scaling config: $ACTUAL"

      - name: Configure Orchestrator Function App
        id: configure-orch-app
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          FUNC_RG=$(tofu output -raw resource_group_name)
          ORCH_NAME=$(tofu output -raw function_app_orch_name)

          az functionapp config container set \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --image "${{ needs.build-image.outputs.orch_image_uri }}"

          mapfile -t APP_SETTINGS < <(
            tofu output -json function_app_cli_app_settings \
              | jq -r 'to_entries[] | "\(.key)=\(.value|tostring)"'
          )

          az webapp config appsettings set \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --settings "${APP_SETTINGS[@]}" PIPELINE_ROLE=orchestrator

          ALLOWED_ORIGINS_JSON=$(tofu output -json browser_allowed_origins | jq -c '.')
          if [ "$(echo "$ALLOWED_ORIGINS_JSON" | jq 'length')" -eq 0 ]; then
            echo "❌ Refusing to clear Orchestrator Function App CORS: browser_allowed_origins is empty"
            exit 1
          fi

          ORCH_ID=$(az functionapp show --name "$ORCH_NAME" --resource-group "$FUNC_RG" --query id -o tsv)
          CORS_BODY=$(jq -cn --argjson origins "$ALLOWED_ORIGINS_JSON" '{properties:{cors:{allowedOrigins:$origins,supportCredentials:false}}}')
          az rest --method PATCH \
            --url "${ORCH_ID}/config/web?api-version=2024-04-01" \
            --body "$CORS_BODY"

          MAX_INSTANCES=$(tofu output -raw function_app_cli_maximum_instance_count)
          ORCH_MIN_INSTANCES=$(tofu output -raw function_app_orch_minimum_instance_count)
          if [ "$ORCH_MIN_INSTANCES" -gt 0 ]; then
            ALWAYS_READY='[{"name":"http","instanceCount":'"${ORCH_MIN_INSTANCES}"'}]'
          else
            ALWAYS_READY='[]'
          fi
          SCALE_BODY=$(jq -cn \
            --argjson max "$MAX_INSTANCES" \
            --argjson ready "$ALWAYS_READY" \
            '{properties:{functionAppConfig:{scaleAndConcurrency:{maximumInstanceCount:$max,alwaysReady:$ready}}}}')
          az rest --method PATCH \
            --url "${ORCH_ID}?api-version=2024-04-01" \
            --body "$SCALE_BODY"

      - name: Verify Function App config contract
        id: verify-config-contract
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          set -euo pipefail

          FUNC_RG=$(tofu output -raw resource_group_name)
          FUNC_NAME=$(tofu output -raw function_app_name)
          ORCH_NAME=$(tofu output -raw function_app_orch_name)

          DESIRED_SETTINGS=$(tofu output -json function_app_cli_app_settings)

          verify_settings_subset() {
            local app_name="$1"
            local expected_json="$2"

            ACTUAL_SETTINGS_JSON=$(az webapp config appsettings list \
              --name "$app_name" \
              --resource-group "$FUNC_RG" \
              | jq 'map({(.name): .value}) | add')

            MISMATCHES=$(jq -n \
              --argjson expected "$expected_json" \
              --argjson actual "$ACTUAL_SETTINGS_JSON" \
              '[
                $expected
                | to_entries[]
                | select(($actual[.key] // null) != .value)
                | {
                    key: .key,
                    status: (if ($actual[.key] // null) == null then "missing" else "different" end)
                  }
              ]')

            if [ "$(echo "$MISMATCHES" | jq 'length')" -gt 0 ]; then
              echo "❌ App settings drift detected for $app_name"
              echo "Drifted keys (values redacted):"
              echo "$MISMATCHES" | jq '.'
              exit 1
            fi

            echo "✅ App settings contract verified for $app_name"
          }

          verify_container_image() {
            local app_name="$1"
            local expected_image="$2"
            local actual_linux_fx_version
            local normalized_actual_image
            local normalized_expected_image

            actual_linux_fx_version=$(az functionapp show \
              --name "$app_name" \
              --resource-group "$FUNC_RG" \
              --query 'siteConfig.linuxFxVersion' -o tsv)

            normalized_actual_image="${actual_linux_fx_version#DOCKER|}"
            normalized_expected_image="${expected_image#DOCKER|}"

            if [ "$normalized_actual_image" != "$normalized_expected_image" ]; then
              echo "❌ Container image drift for $app_name: expected=$expected_image actual=$actual_linux_fx_version"
              exit 1
            fi

            echo "✅ Container image contract verified for $app_name"
          }

          verify_identity_contract() {
            local app_name="$1"
            local identity_type
            local principal_id

            identity_type=$(az functionapp show \
              --name "$app_name" \
              --resource-group "$FUNC_RG" \
              --query 'identity.type' -o tsv)

            principal_id=$(az functionapp show \
              --name "$app_name" \
              --resource-group "$FUNC_RG" \
              --query 'identity.principalId' -o tsv)

            if [ "$identity_type" != "SystemAssigned" ]; then
              echo "❌ Managed identity type drift for $app_name: expected=SystemAssigned actual=${identity_type:-<missing>}"
              exit 1
            fi

            if [ -z "$principal_id" ]; then
              echo "❌ Managed identity principalId missing for $app_name"
              exit 1
            fi

            echo "✅ Managed identity contract verified for $app_name"
          }

          ORCH_SETTINGS=$(jq -n \
            --argjson base "$DESIRED_SETTINGS" \
            '$base + {"PIPELINE_ROLE":"orchestrator"}')

          verify_settings_subset "$FUNC_NAME" "$DESIRED_SETTINGS"
          verify_settings_subset "$ORCH_NAME" "$ORCH_SETTINGS"

          verify_container_image "$FUNC_NAME" "${{ needs.build-image.outputs.image_uri }}"
          verify_container_image "$ORCH_NAME" "${{ needs.build-image.outputs.orch_image_uri }}"

          # Fail fast on identity drift: this wiring is load-bearing for Key Vault refs,
          # storage RBAC, and durable pipeline access.
          verify_identity_contract "$FUNC_NAME"
          verify_identity_contract "$ORCH_NAME"

      - name: Verify browser CORS contract
        id: verify-browser-cors
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          RG_NAME=$(tofu output -raw resource_group_name)
          FUNC_HOST=$(tofu output -raw function_app_orch_default_hostname)
          STORAGE_NAME=$(tofu output -raw storage_account_name)
          ORIGINS_JSON=$(tofu output -json browser_allowed_origins)

          if [ "$(echo "$ORIGINS_JSON" | jq 'length')" -eq 0 ]; then
            echo "❌ browser_allowed_origins is empty; cannot verify browser CORS contract"
            exit 1
          fi

          # Only verify https:// origins — localhost entries are dev convenience
          # and cannot be meaningfully checked from a CI runner.
          while IFS= read -r origin; do
            echo "Checking Function App preflight for ${origin}"
            HEADERS=$(mktemp)
            STATUS=$(curl -sS -o /dev/null -D "$HEADERS" \
              -X OPTIONS "https://${FUNC_HOST}/api/upload/token" \
              -H "Origin: ${origin}" \
              -H 'Access-Control-Request-Method: POST' \
              -H 'Access-Control-Request-Headers: content-type,x-ms-client-principal' \
              -w '%{http_code}')
            ACAO=$(awk 'tolower($0) ~ /^access-control-allow-origin:/ {gsub(/\r/, "", $2); print $2}' "$HEADERS")
            rm -f "$HEADERS"
            # Azure Functions returns 200 or 204 for OPTIONS preflights.
            if { [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; } || [ "$ACAO" != "$origin" ]; then
              echo "❌ Function App preflight failed for ${origin}: status=${STATUS} allow-origin=${ACAO:-<missing>}"
              exit 1
            fi
          done < <(echo "$ORIGINS_JSON" | jq -r '.[] | select(startswith("https://"))')

          BLOB_CORS_JSON=$(az storage account blob-service-properties show \
            --account-name "$STORAGE_NAME" \
            --resource-group "$RG_NAME" \
            --query 'cors.corsRules' -o json)

          if [ "$(echo "$BLOB_CORS_JSON" | jq '. // [] | length')" -eq 0 ]; then
            echo "❌ Blob service has no CORS rules configured"
            exit 1
          fi

          while IFS= read -r origin; do
            MATCH_COUNT=$(echo "$BLOB_CORS_JSON" | jq --arg origin "$origin" '[.[] | select((.allowedOrigins // []) | index($origin)) | select((.allowedMethods // []) | index("PUT")) | select((.allowedMethods // []) | index("OPTIONS"))] | length')
            if [ "$MATCH_COUNT" -eq 0 ]; then
              echo "❌ Blob CORS missing required origin or methods for ${origin}"
              exit 1
            fi
          done < <(echo "$ORIGINS_JSON" | jq -r '.[] | select(startswith("https://"))')

          echo "✅ Browser CORS contract verified for Function App preflight and blob service configuration."

      - name: Export Function App hostname
        id: hostname
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          HOSTNAME=$(tofu output -raw function_app_orch_default_hostname)
          echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"

      - name: Export Compute Function App hostname
        id: compute-hostname
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          HOSTNAME=$(tofu output -raw function_app_default_hostname)
          echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"

      - name: Export SWA hostname
        id: swa-hostname
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          HOSTNAME=$(tofu output -raw static_web_app_default_hostname)
          CUSTOM_DOMAIN=$(tofu output -raw custom_domain)
          echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"
          echo "custom_domain=${CUSTOM_DOMAIN}" >> "$GITHUB_OUTPUT"

      - name: Export App Insights connection string
        id: appinsights
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          echo "connection_string=$(tofu output -raw appinsights_connection_string)" >> "$GITHUB_OUTPUT"

      - name: Verify runtime readiness
        id: verify-readiness
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          set -euo pipefail
          MAX_WAIT=300          # container startup + route registration can exceed 90s under cold start
          INTERVAL=5
          COMPUTE_HOSTNAME=$(tofu output -raw function_app_default_hostname)
          ORCH_HOSTNAME=$(tofu output -raw function_app_orch_default_hostname)

          probe_code() {
            local url="$1"
            local code
            # curl prints 000 on connection errors; avoid `|| echo 000` which can
            # produce 000000 and obscure diagnostics.
            code=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 3 --max-time 8 "$url" 2>/dev/null || true)
            if [[ "$code" =~ ^[0-9]{3}$ ]]; then
              echo "$code"
            else
              echo "000"
            fi
          }

          verify_host_readiness() {
            local role="$1"
            local hostname="$2"
            local base_url="https://${hostname}"
            local elapsed=0
            local health_code=0
            local ready_code=0

            echo "Waiting for ${role} runtime ${base_url}/api/health to become ready..."

            while [ $elapsed -lt $MAX_WAIT ]; do
              health_code=$(probe_code "${base_url}/api/health")
              ready_code=$(probe_code "${base_url}/api/readiness")

              echo "  ${role} [${elapsed}s] health=${health_code} readiness=${ready_code}"

              if [ "$health_code" = "200" ] && [ "$ready_code" = "200" ]; then
                echo "✅ ${role} runtime is healthy and ready."
                HEALTH_BODY=$(curl -s --max-time 5 "${base_url}/api/health" 2>/dev/null || true)
                echo "  ${role} deployed version: $(echo "$HEALTH_BODY" | jq -r '.version // "unknown"') ($(echo "$HEALTH_BODY" | jq -r '.commit // "unknown"'))"
                return 0
              fi

              # Fail fast on real server errors — but tolerate 502/503/504 which
              # are normal during Container Apps cold start + Python worker init.
              if [[ "$health_code" =~ ^5 ]] && ! [[ "$health_code" =~ ^50[234]$ ]]; then
                echo "❌ ${role} server error (health=${health_code}). Failing."
                return 1
              fi
              if [[ "$ready_code" =~ ^5 ]] && ! [[ "$ready_code" =~ ^50[234]$ ]]; then
                echo "❌ ${role} server error (readiness=${ready_code}). Failing."
                return 1
              fi

              # 502/503/504 / 404 / 000 — transient during cold start, keep waiting
              sleep $INTERVAL
              elapsed=$((elapsed + INTERVAL))
            done

            echo ""
            echo "❌ ${role} readiness checks did not pass within ${MAX_WAIT}s."
            echo "── ${role} endpoint probe matrix ──"
            echo "  health:    ${health_code}"
            echo "  readiness: ${ready_code}"
            echo "  elapsed:   ${elapsed}s"
            echo "  hostname:  ${hostname}"
            echo ""
            echo "── DNS lookup (${role}) ──"
            getent hosts "${hostname}" || true
            echo ""
            echo "── Final curl diagnostics (${role} /api/health) ──"
            curl -sv --connect-timeout 5 --max-time 10 "${base_url}/api/health" -o /dev/null 2>&1 | tail -n 40 || true
            echo ""
            echo "This may indicate:"
            echo "  - Container image failed to start (check Container Apps logs)"
            echo "  - Route registration lag exceeded timeout"
            echo "  - The function app hostname has changed"
            return 1
          }

          verify_host_readiness "compute" "$COMPUTE_HOSTNAME" &
          COMPUTE_PID=$!
          verify_host_readiness "orchestrator" "$ORCH_HOSTNAME" &
          ORCH_PID=$!

          set +e
          wait "$COMPUTE_PID"
          COMPUTE_STATUS=$?
          wait "$ORCH_PID"
          ORCH_STATUS=$?
          set -e

          if [ "$COMPUTE_STATUS" -ne 0 ] || [ "$ORCH_STATUS" -ne 0 ]; then
            echo "❌ Runtime readiness failed (compute=${COMPUTE_STATUS}, orchestrator=${ORCH_STATUS})"
            exit 1
          fi

          echo "✅ Runtime readiness verified for compute and orchestrator in parallel."

      - name: Reconcile Event Grid subscription
        id: reconcile-eventgrid
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          RG_NAME=$(tofu output -raw resource_group_name)
          FUNC_NAME=$(tofu output -raw function_app_orch_name)
          HOSTNAME=$(tofu output -raw function_app_orch_default_hostname)
          TOPIC_NAME=$(tofu output -raw event_grid_system_topic_name)

          python ../../scripts/reconcile_eventgrid_subscription.py \
            --resource-group "$RG_NAME" \
            --function-app "$FUNC_NAME" \
            --hostname "$HOSTNAME" \
            --system-topic-name "$TOPIC_NAME"

      - name: Validate infra gate
        id: validate-infra-gate
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          RG_NAME=$(tofu output -raw resource_group_name)
          FUNC_NAME=$(tofu output -raw function_app_orch_name)
          HOSTNAME=$(tofu output -raw function_app_orch_default_hostname)
          TOPIC_NAME=$(tofu output -raw event_grid_system_topic_name)
          EXPECTED_CAP=$(awk -F '=' '/^log_daily_cap_gb[[:space:]]*=/{gsub(/[[:space:]]/, "", $2); print $2; exit}' environments/${{ env.DEPLOY_ENV }}.tfvars)
          : "${EXPECTED_CAP:=0.1}"

          python ../../scripts/validate_dev_infra_gate.py \
            --resource-group "$RG_NAME" \
            --function-app "$FUNC_NAME" \
            --hostname "$HOSTNAME" \
            --system-topic-name "$TOPIC_NAME" \
            --expected-daily-cap-gb "$EXPECTED_CAP"

      - name: Run async functional smoke gate
        id: async-smoke-gate
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          DEPLOY_SMOKE_BEARER_TOKEN: ${{ secrets.DEPLOY_SMOKE_BEARER_TOKEN }}
          SMOKE_POLL_INTERVAL: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_poll_interval_seconds || '5' }}
          SMOKE_MAX_ATTEMPTS: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_max_attempts || '60' }}
        run: |
          python -m pip install --disable-pip-version-check --quiet httpx

          HOSTNAME=$(tofu output -raw function_app_orch_default_hostname)
          API_BASE="https://${HOSTNAME}"
          echo "Running async smoke gate against ${API_BASE}"
          echo "Smoke poll interval=${SMOKE_POLL_INTERVAL}s max_attempts=${SMOKE_MAX_ATTEMPTS}"

          SMOKE_ARGS=(
            --api-base "$API_BASE"
            --kml-path ../../tests/fixtures/sample.kml
            --poll-interval "$SMOKE_POLL_INTERVAL"
            --max-attempts "$SMOKE_MAX_ATTEMPTS"
            --skip-manifest-check
          )

          if [ -z "${DEPLOY_SMOKE_BEARER_TOKEN:-}" ]; then
            echo "DEPLOY_SMOKE_BEARER_TOKEN is required for bearer-only smoke gate"
            exit 1
          fi

          SMOKE_ARGS+=(--bearer-token "$DEPLOY_SMOKE_BEARER_TOKEN")

          python ../../scripts/e2e_smoke_gate.py "${SMOKE_ARGS[@]}"

      # ── Safe deploy: rollback to previous image on readiness failure ──
      - name: Rollback to previous image
        if: |
          failure()
          && (steps.configure-app.outcome == 'success' || steps.configure-orch-app.outcome == 'success')
          && (steps.current-image.outputs.image_compute != '' || steps.current-image.outputs.image_orch != '')
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          PREV_COMPUTE_IMAGE="${{ steps.current-image.outputs.image_compute }}"
          PREV_ORCH_IMAGE="${{ steps.current-image.outputs.image_orch }}"
          FUNC_NAME="${{ steps.current-image.outputs.func_name }}"
          ORCH_NAME="${{ steps.current-image.outputs.orch_name }}"
          FUNC_RG="${{ steps.current-image.outputs.func_rg }}"

          echo "⚠️ Readiness checks failed — rolling back to previous images."

          if [ -n "$PREV_COMPUTE_IMAGE" ] && [ "${{ steps.configure-app.outcome }}" = "success" ]; then
            echo "  Compute previous: ${PREV_COMPUTE_IMAGE}"
            echo "  Compute failed:   ${{ needs.build-image.outputs.image_uri }}"
            az functionapp config container set \
              --name "$FUNC_NAME" \
              --resource-group "$FUNC_RG" \
              --image "$PREV_COMPUTE_IMAGE"
          fi

          if [ -n "$PREV_ORCH_IMAGE" ] && [ "${{ steps.configure-orch-app.outcome }}" = "success" ]; then
            echo "  Orchestrator previous: ${PREV_ORCH_IMAGE}"
            echo "  Orchestrator failed:   ${{ needs.build-image.outputs.orch_image_uri }}"
            az functionapp config container set \
              --name "$ORCH_NAME" \
              --resource-group "$FUNC_RG" \
              --image "$PREV_ORCH_IMAGE"
          fi

          check_health() {
            local role="$1"
            local hostname="$2"
            local base_url="https://${hostname}"
            for i in $(seq 1 12); do
              sleep 10
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${base_url}/api/health" 2>/dev/null || echo "000")
              echo "  ${role} [${i}0s] health=${code}"
              if [ "$code" = "200" ]; then
                return 0
              fi
            done
            return 1
          }

          COMPUTE_HOSTNAME="${{ steps.compute-hostname.outputs.hostname }}"
          ORCH_HOSTNAME="${{ steps.hostname.outputs.hostname }}"

          if [ -z "$COMPUTE_HOSTNAME" ]; then
            COMPUTE_HOSTNAME=$(tofu output -raw function_app_default_hostname)
          fi
          if [ -z "$ORCH_HOSTNAME" ]; then
            ORCH_HOSTNAME=$(tofu output -raw function_app_orch_default_hostname)
          fi

          if [ -z "$COMPUTE_HOSTNAME" ] || [ -z "$ORCH_HOSTNAME" ]; then
            echo "❌ Rollback health verification could not resolve function app hostnames."
            exit 1
          fi

          echo "Waiting for rolled-back containers to become healthy..."
          if ! check_health "compute" "$COMPUTE_HOSTNAME"; then
            echo "⚠️ Compute rollback applied but health did not recover within 120s."
            exit 1
          fi
          if ! check_health "orchestrator" "$ORCH_HOSTNAME"; then
            echo "⚠️ Orchestrator rollback applied but health did not recover within 120s."
            exit 1
          fi

          echo "✅ Rollback successful — both previous images are healthy."

      - name: Rollback orchestrator to previous image
        if: failure() && steps.configure-orch-app.outcome == 'success' && steps.current-orch-image.outputs.image != ''
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          PREV_IMAGE="${{ steps.current-orch-image.outputs.image }}"
          ORCH_NAME="${{ steps.current-orch-image.outputs.func_name }}"
          FUNC_RG="${{ steps.current-orch-image.outputs.func_rg }}"

          echo "⚠️ Readiness checks failed — rolling back orchestrator to previous image."
          echo "  Previous: ${PREV_IMAGE}"
          echo "  Failed:   ${{ needs.build-image.outputs.orch_image_uri }}"

          az functionapp config container set \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --image "$PREV_IMAGE"

          # Wait for the rollback to take effect
          echo "Waiting for rolled-back orchestrator container to become healthy..."
          HOSTNAME="${{ steps.hostname.outputs.hostname }}"
          BASE_URL="https://${HOSTNAME}"
          for i in $(seq 1 12); do
            sleep 10
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${BASE_URL}/api/health" 2>/dev/null || echo "000")
            echo "  [${i}0s] health=${code}"
            if [ "$code" = "200" ]; then
              echo "✅ Orchestrator rollback successful — previous image is healthy."
              exit 0
            fi
          done
          echo "⚠️ Orchestrator rollback applied but health check did not recover within 120s."
          echo "  Manual intervention may be required."
          exit 1

  # ── 3. Deploy static website ───────────────────────────────
  deploy-website:
    name: Deploy Static Website
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Inject API config
        run: |
          cat > website/api-config.json <<EOF
          {"apiBase": "https://${{ needs.deploy-infra.outputs.function_app_orch_hostname }}", "lastVerified": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF

      - name: Inject analytics config
        env:
          AI_CONNECTION_STRING: ${{ needs.deploy-infra.outputs.appinsights_connection_string }}
        run: |
          if [ -n "$AI_CONNECTION_STRING" ]; then
            find website -name '*.html' -exec sed -i \
              's|name="ai-connection-string" content=""|name="ai-connection-string" content="'"$AI_CONNECTION_STRING"'"|' {} +
          fi

      - name: Inject CIAM config
        env:
          CIAM_CLIENT_ID: ${{ secrets.CIAM_CLIENT_ID }}
          CIAM_AUTHORITY: ${{ secrets.CIAM_AUTHORITY }}
          CIAM_TENANT_ID: ${{ secrets.CIAM_TENANT_ID }}
        run: |
          if [ -n "$CIAM_CLIENT_ID" ] && [ -n "$CIAM_AUTHORITY" ]; then
            CIAM_JSON="{\"clientId\":\"${CIAM_CLIENT_ID}\",\"authority\":\"${CIAM_AUTHORITY}\",\"tenantId\":\"${CIAM_TENANT_ID}\"}"
            find website -name '*.html' -exec sed -i \
              's|{"clientId":"","authority":"","tenantId":""}|'"${CIAM_JSON}"'|' {} +
          fi

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /website
          skip_app_build: true

      - name: Smoke-check Container Apps Function App
        run: |
          FA_HOSTNAME="${{ needs.deploy-infra.outputs.function_app_orch_hostname }}"
          BASE_URL="https://${FA_HOSTNAME}"
          echo "Checking Container Apps FA at ${BASE_URL}..."

          # Verify health endpoint returns 200 (proves function app is running)
          for i in $(seq 1 6); do
            HEALTH=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
              "${BASE_URL}/api/health" 2>/dev/null || echo "000")
            echo "  [attempt ${i}] GET /api/health → HTTP ${HEALTH}"
            if [ "$HEALTH" = "200" ]; then
              echo "✅ Container Apps FA health endpoint responding"
              break
            fi
            sleep 10
          done
          if [ "$HEALTH" != "200" ]; then
            echo "❌ FA health endpoint did not return 200 within 60s (got ${HEALTH})"
            exit 1
          fi
