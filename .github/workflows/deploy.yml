# ─────────────────────────────────────────────────────────────
# Deploy — Infra (OpenTofu) → Container image (GHCR) → Static site
#
# Triggered when CI passes on main, or manually.
# The same immutable container image is built once and can be
# promoted to any environment by re-running with a different
# `environment` input.
#
# Required GitHub Secrets (set per GitHub Environment):
#   AZURE_CLIENT_ID         — SP / managed identity client ID (OIDC)
#   AZURE_TENANT_ID         — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID   — Target subscription
#   TF_STATE_RESOURCE_GROUP — Resource group holding tfstate storage
#   TF_STATE_STORAGE_ACCOUNT— Storage account name for tfstate
#   TF_STATE_CONTAINER      — Blob container for this environment
#   TF_STATE_KEY            — Blob key for the state file
#   SWA_DEPLOYMENT_TOKEN    — Static Web App deployment token
#
# ─────────────────────────────────────────────────────────────
name: Deploy

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment (must match a GitHub Environment and a tfvars file)
        required: true
        type: choice
        options:
          - dev
          - prd
        default: dev
      image_tag:
        description: 'Container image tag to deploy (default: latest main SHA)'
        required: false
        type: string
      rebuild_after_manual_teardown:
        description: Recreate after app-managed resources were deleted manually outside the workflow.
        required: false
        type: boolean
        default: false
      smoke_poll_interval_seconds:
        description: Poll interval (seconds) for post-readiness async smoke gate.
        required: false
        type: string
        default: "5"
      smoke_max_attempts:
        description: Max orchestrator poll attempts for post-readiness async smoke gate.
        required: false
        type: string
        default: "60"

permissions:
  contents: read
  id-token: write
  packages: write          # push to GHCR
  security-events: write   # upload Trivy SARIF

concurrency:
  group: deploy-${{ inputs.environment || 'dev' }}-${{ github.ref }}
  cancel-in-progress: false

env:
  TOFU_VERSION: "1.8.0"
  # Resolve environment: workflow_dispatch supplies it; workflow_run always deploys to dev.
  DEPLOY_ENV: ${{ inputs.environment || 'dev' }}

jobs:
  # ── 0. Release-safety gate ─────────────────────────────────
  # Hard guards active during the pipeline reset (no production
  # deployment; local-only validation). build-image needs this gate.
  #   • Production is frozen: any prd target fails immediately (loud).
  #   • Auto dev deploys (main CI success) are skipped while the repo
  #     variable DEPLOY_PAUSED=true, so a merge to main does not push
  #     into a torn-down dev environment (clean skip, no failed run).
  # Lift by removing the prd guard and setting DEPLOY_PAUSED=false.
  preflight:
    name: Release-safety gate
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}
    outputs:
      proceed: ${{ steps.gate.outputs.proceed }}
    steps:
      - name: Block production deploys (reset freeze)
        if: ${{ inputs.environment == 'prd' }}
        run: |
          echo "::error::Production deploys are frozen during the pipeline reset. Lift the freeze in .github/workflows/deploy.yml (preflight job) when ready to ship to prd."
          exit 1

      - name: Evaluate deploy gate
        id: gate
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ] && [ "${{ vars.DEPLOY_PAUSED }}" = "true" ]; then
            echo "::notice::Auto dev deploy is paused (DEPLOY_PAUSED=true) during the pipeline reset. Skipping deploy. Set DEPLOY_PAUSED=false to resume, or deploy manually via workflow_dispatch."
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Release-safety gate passed for env '${DEPLOY_ENV}' (trigger ${{ github.event_name }})." >> "$GITHUB_STEP_SUMMARY"
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

  # ── 1. Build & push container to GHCR ──────────────────────
  # When promoting an existing image (image_tag input set), this job
  # resolves the URI without rebuilding.
  build-image:
    name: Build & Push Container
    runs-on: ubuntu-latest
    needs: preflight
    if: ${{ needs.preflight.outputs.proceed == 'true' && (github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch') }}
    outputs:
      image_uri: ${{ steps.resolve.outputs.image_uri || steps.meta.outputs.image_uri }}
      orch_image_uri: ${{ steps.resolve-orch.outputs.orch_image_uri || steps.orch-meta.outputs.orch_image_uri }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      # ── Guard: prd must promote an existing image ──────────
      - name: Require image_tag for production
        if: ${{ inputs.environment == 'prd' && inputs.image_tag == '' }}
        run: |
          echo "::error::Production deploys must promote an existing image. Provide image_tag."
          exit 1

      # ── Promotion path: reuse an existing GHCR image ────────
      - name: Resolve existing image for promotion
        id: resolve
        if: ${{ inputs.image_tag != '' }}
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          source .github/image-config.env
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_IMAGE_REPO}"
          echo "image_uri=${IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "### ♻️ Promoting existing image: \`${IMAGE_NAME}:${IMAGE_TAG}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Resolve existing orchestrator image for promotion
        id: resolve-orch
        if: ${{ inputs.image_tag != '' }}
        env:
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          source .github/image-config.env
          ORCH_IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${ORCH_IMAGE_REPO}"
          echo "orch_image_uri=${ORCH_IMAGE_NAME}:${IMAGE_TAG}" >> "$GITHUB_OUTPUT"

      # ── Normal path: build fresh image ──────────────────────
      - name: Log in to GHCR
        if: ${{ inputs.image_tag == '' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tag
        if: ${{ inputs.image_tag == '' }}
        id: meta
        run: |
          source .github/image-config.env
          IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${APP_IMAGE_REPO}"
          ORCH_IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${ORCH_IMAGE_REPO}"
          TAG="${{ github.sha }}"
          APP_VERSION=$(grep -oP '(?<=^version = ")[^"]+' pyproject.toml)
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "orch_image_name=${ORCH_IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "orch_image_uri=${ORCH_IMAGE_NAME}:${TAG}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set orchestrator image metadata
        if: ${{ inputs.image_tag == '' }}
        id: orch-meta
        run: |
          source .github/image-config.env
          ORCH_IMAGE_NAME="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${ORCH_IMAGE_REPO}"
          echo "orch_image_uri=${ORCH_IMAGE_NAME}:${{ github.sha }}" >> "$GITHUB_OUTPUT"

      - name: Resolve base image
        if: ${{ inputs.image_tag == '' }}
        id: base
        run: |
          source .github/image-config.env
          GHCR_IMAGE="ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/${BASE_IMAGE_REPO}:latest"

          if docker pull "${GHCR_IMAGE}" 2>/dev/null; then
            echo "image=${GHCR_IMAGE}" >> "$GITHUB_OUTPUT"
            echo "### Base image: pulled from GHCR :package:" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::Base image not found on GHCR — building from Dockerfile.base"
            LOCAL_TAG="treesight-base:ci-local"
            docker build -f Dockerfile.base -t "${LOCAL_TAG}" .
            echo "image=${LOCAL_TAG}" >> "$GITHUB_OUTPUT"
            echo "### Base image: built locally from Dockerfile.base :hammer:" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Build image
        if: ${{ inputs.image_tag == '' }}
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
        run: |
          docker build \
            --build-arg BASE_IMAGE="${{ steps.base.outputs.image }}" \
            --build-arg APP_VERSION="${{ steps.meta.outputs.app_version }}" \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t "${IMAGE_NAME}:${{ github.sha }}" \
            -t "${IMAGE_NAME}:${{ steps.meta.outputs.app_version }}" \
            -t "${IMAGE_NAME}:latest" .

      - name: Build orchestrator image
        if: ${{ inputs.image_tag == '' }}
        env:
          ORCH_IMAGE_NAME: ${{ steps.meta.outputs.orch_image_name }}
        run: |
          docker build \
            -f Dockerfile.orchestrator \
            --build-arg BASE_IMAGE="${{ steps.base.outputs.image }}" \
            --build-arg APP_VERSION="${{ steps.meta.outputs.app_version }}" \
            --build-arg GIT_SHA="${{ github.sha }}" \
            -t "${ORCH_IMAGE_NAME}:${{ github.sha }}" \
            -t "${ORCH_IMAGE_NAME}:${{ steps.meta.outputs.app_version }}" \
            -t "${ORCH_IMAGE_NAME}:latest" .

      - name: Run container smoke tests
        if: ${{ inputs.image_tag == '' }}
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
        run: |
          docker run --rm \
            -e CIAM_AUTHORITY="https://canopex.ciamlogin.com" \
            -e CIAM_TENANT_ID="ci-test-tenant" \
            -e CIAM_API_AUDIENCE="api://ci-test-audience" \
            -v "${{ github.workspace }}/scripts:/scripts:ro" \
            "${IMAGE_NAME}:${{ github.sha }}" \
            python3 /scripts/container_smoke_test.py

      - name: Push to GHCR
        if: ${{ inputs.image_tag == '' }}
        env:
          IMAGE_NAME: ${{ steps.meta.outputs.image_name }}
          ORCH_IMAGE_NAME: ${{ steps.meta.outputs.orch_image_name }}
        run: |
          push_with_retry() {
            local n=0
            until docker push "$1"; do
              n=$((n + 1))
              if [[ $n -ge 3 ]]; then
                echo "::error::Push failed after 3 attempts: $1"
                return 1
              fi
              echo "Push failed (attempt $n/3), retrying in 15s..."
              sleep 15
            done
          }
          push_with_retry "${IMAGE_NAME}:${{ github.sha }}"
          push_with_retry "${IMAGE_NAME}:${{ steps.meta.outputs.app_version }}"
          push_with_retry "${IMAGE_NAME}:latest"
          push_with_retry "${ORCH_IMAGE_NAME}:${{ github.sha }}"
          push_with_retry "${ORCH_IMAGE_NAME}:${{ steps.meta.outputs.app_version }}"
          push_with_retry "${ORCH_IMAGE_NAME}:latest"

      - name: Trivy container scan (single pass to JSON)
        id: trivy-scan
        if: ${{ inputs.image_tag == '' }}
        uses: ./.github/actions/trivy-scan
        with:
          scan: image
          image: ${{ steps.meta.outputs.image_uri }}
          scanners: vuln
          image-exit: "0"
          format: json
          output: trivy-image.json

      - name: Convert Trivy JSON to SARIF
        if: ${{ inputs.image_tag == '' }}
        run: |
          trivy convert --format sarif --output trivy-image.sarif trivy-image.json

      - name: Fail on HIGH/CRITICAL findings
        if: ${{ inputs.image_tag == '' }}
        run: |
          findings=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL" or .Severity == "HIGH")] | length' trivy-image.json)
          if [ "${findings}" -gt 0 ]; then
            echo "::error::Trivy found ${findings} HIGH/CRITICAL vulnerability findings after ignores."
            echo "Top findings:"
            jq -r '
              [.Results[]?.Vulnerabilities[]?]
              | sort_by(.Severity, .VulnerabilityID)
              | .[]
              | "- \(.Severity) \(.VulnerabilityID) pkg=\(.PkgName) installed=\(.InstalledVersion // "unknown") fixed=\(.FixedVersion // "unfixed")"
            ' trivy-image.json | head -30
            critical_count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "CRITICAL")] | length' trivy-image.json)
            high_count=$(jq '[.Results[]?.Vulnerabilities[]? | select(.Severity == "HIGH")] | length' trivy-image.json)
            echo "Summary: CRITICAL=${critical_count} HIGH=${high_count}"
            exit 1
          fi
          echo "Trivy found 0 HIGH/CRITICAL vulnerability findings."

      - name: Upload Trivy image SARIF
        if: ${{ always() && inputs.image_tag == '' && hashFiles('trivy-image.sarif') != '' }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

  # ── 2. Deploy infrastructure with OpenTofu ─────────────────
  deploy-infra:
    name: Deploy Infrastructure
    runs-on: ubuntu-latest
    needs: build-image
    environment: ${{ github.event.inputs.environment || 'dev' }}
    env:
      TF_VAR_deploy_principal_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      # CIAM tenant_id, subdomain, client_id, and api_audience are in tfvars
      # (all public values). Only the deploy SP client_id remains a secret.
      TF_VAR_ciam_deploy_client_id: ${{ secrets.TF_VAR_CIAM_DEPLOY_CLIENT_ID || '' }}
    outputs:
      function_app_orch_hostname: ${{ steps.hostname.outputs.hostname }}
      appinsights_connection_string: ${{ steps.appinsights.outputs.connection_string }}
      swa_hostname: ${{ steps.swa-hostname.outputs.hostname }}
      custom_domain: ${{ steps.swa-hostname.outputs.custom_domain }}
      ciam_page_config: ${{ steps.ciam-page-config.outputs.json }}
      storage_account_name: ${{ steps.storage-account.outputs.name }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@a1320f892987e89d278cc92dc5adc984fb93aca4 # v2.0.2
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Validate CIAM deploy SP wiring
        shell: bash
        run: |
          trim_space() {
            local value="${1-}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }
          set -euo pipefail
          # tenant_id, subdomain, client_id, api_audience are sourced from tfvars
          # (public values). Only deploy_client_id remains a secret; without it,
          # Tofu skips CIAM management entirely.
          ciam_deploy_client_id="$(trim_space "${TF_VAR_ciam_deploy_client_id:-}")"
          if [[ -z "$ciam_deploy_client_id" ]]; then
            echo "⚠️  TF_VAR_CIAM_DEPLOY_CLIENT_ID not set — Tofu will skip all CIAM management (redirect URIs, app registration, federated creds). Bootstrap the deploy SP and set this secret to enable."
          else
            echo "✅ TF_VAR_CIAM_DEPLOY_CLIENT_ID is set — Tofu will manage CIAM redirect URIs and (once object IDs are set in tfvars) the full app registration, federated creds, and owner assertion."
            echo "   See infra/tofu/README.md 'CIAM Tofu ownership' for Phases 2–4 instructions."
          fi

      - name: Cache OpenTofu providers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: infra/tofu/.terraform/providers
          key: tofu-providers-${{ hashFiles('infra/tofu/.terraform.lock.hcl') }}
          restore-keys: tofu-providers-

      - name: Resolve state backend secrets
        run: |
          if [ "${{ env.DEPLOY_ENV }}" == "prd" ]; then
            echo "TF_STATE_CONTAINER=${{ secrets.TF_STATE_CONTAINER_PRD }}" >> "$GITHUB_ENV"
            echo "TF_STATE_KEY=${{ secrets.TF_STATE_KEY_PRD }}" >> "$GITHUB_ENV"
          else
            echo "TF_STATE_CONTAINER=${{ secrets.TF_STATE_CONTAINER_DEV }}" >> "$GITHUB_ENV"
            echo "TF_STATE_KEY=${{ secrets.TF_STATE_KEY_DEV }}" >> "$GITHUB_ENV"
          fi

      - name: Tofu Init
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "tofu init attempt ${attempt}/${MAX_RETRIES}"
            if tofu init \
              -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
              -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
              -backend-config="container_name=$TF_STATE_CONTAINER" \
              -backend-config="key=$TF_STATE_KEY"; then
              echo "✅ tofu init succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "⚠️ tofu init failed, retrying in 10s..."
              sleep 10
            fi
          done
          echo "❌ tofu init failed after ${MAX_RETRIES} attempts"
          exit 1

      - name: Drop stale azapi state after manual teardown
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.rebuild_after_manual_teardown }}
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          STATE_LIST=$(tofu state list 2>/dev/null || true)
          for address in \
            azapi_resource.function_app \
            azapi_resource.event_grid_system_topic \
            azapi_resource_action.function_host_keys \
            azapi_resource.event_grid_subscription; do
            if printf '%s\n' "$STATE_LIST" | grep -Fx "$address" >/dev/null; then
              tofu state rm "$address"
            fi
          done

      - name: Tofu Plan
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          tofu plan -out=tfplan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="container_image=${{ needs.build-image.outputs.image_uri }}" \
            -var="orchestrator_image=${{ needs.build-image.outputs.orch_image_uri }}" \
            -var-file="environments/${{ env.DEPLOY_ENV }}.tfvars"

      - name: Tofu Apply
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: tofu apply -auto-approve tfplan

      # Capture current container images so we can rollback if the
      # new deployment fails readiness checks.
      - name: Capture current container images
        id: current-image
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          FUNC_RG=$(tofu output -raw resource_group_name)
          FUNC_NAME=$(tofu output -raw function_app_name)
          ORCH_NAME=$(tofu output -raw function_app_orch_name)

          CURRENT_COMPUTE_IMAGE=$(az functionapp config container show \
            --name "$FUNC_NAME" \
            --resource-group "$FUNC_RG" \
            --query '[?name==`DOCKER_CUSTOM_IMAGE_NAME`].value' -o tsv 2>/dev/null || echo "")

          CURRENT_ORCH_IMAGE=$(az functionapp config container show \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --query '[?name==`DOCKER_CUSTOM_IMAGE_NAME`].value' -o tsv 2>/dev/null || echo "")

          echo "image_compute=${CURRENT_COMPUTE_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_orch=${CURRENT_ORCH_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "func_rg=${FUNC_RG}" >> "$GITHUB_OUTPUT"
          echo "func_name=${FUNC_NAME}" >> "$GITHUB_OUTPUT"
          echo "orch_name=${ORCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "Previous compute image: ${CURRENT_COMPUTE_IMAGE:-<none>}"
          echo "Previous orchestrator image: ${CURRENT_ORCH_IMAGE:-<none>}"

      - name: Capture current orchestrator container image
        id: current-orch-image
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          FUNC_RG=$(tofu output -raw resource_group_name)
          ORCH_NAME=$(tofu output -raw function_app_orch_name)
          CURRENT_IMAGE=$(az functionapp config container show \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --query '[?name==`DOCKER_CUSTOM_IMAGE_NAME`].value' -o tsv 2>/dev/null || echo "")
          echo "image=${CURRENT_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "func_rg=${FUNC_RG}" >> "$GITHUB_OUTPUT"
          echo "func_name=${ORCH_NAME}" >> "$GITHUB_OUTPUT"
          echo "Previous orchestrator image: ${CURRENT_IMAGE:-<none>}"

      # azapi v2 crashes when updating the function app body (identity bug).
      # So tofu ignores body changes and we apply mutable config via CLI.
      - name: Configure Function App
        id: configure-app
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          FUNC_RG=$(tofu output -raw resource_group_name)
          FUNC_NAME=$(tofu output -raw function_app_name)

          az functionapp config container set \
            --name "$FUNC_NAME" \
            --resource-group "$FUNC_RG" \
            --image "${{ needs.build-image.outputs.image_uri }}"

          # Keep Terraform as the source of truth for CLI-managed settings while
          # the azapi identity bug still forces body ignore_changes on updates.
          mapfile -t APP_SETTINGS < <(
            tofu output -json function_app_cli_app_settings \
              | jq -r 'to_entries[] | "\(.key)=\(.value|tostring)"'
          )

          az webapp config appsettings set \
            --name "$FUNC_NAME" \
            --resource-group "$FUNC_RG" \
            --settings "${APP_SETTINGS[@]}"

          # Keep platform-level CORS in sync via CLI because tofu ignores body
          # updates on the Function App resource while the azapi identity bug exists.
          ALLOWED_ORIGINS_JSON=$(tofu output -json browser_allowed_origins | jq -c '.')
          if [ "$(echo "$ALLOWED_ORIGINS_JSON" | jq 'length')" -eq 0 ]; then
            echo "❌ Refusing to clear Function App CORS: browser_allowed_origins is empty"
            exit 1
          fi

          # CORS and scaling are combined into a single root-resource PATCH.
          # Two back-to-back PATCHes on the same entity cause ARM's
          # ConflictingConcurrentWriteNotAllowed (409). siteConfig.cors is the
          # root-resource equivalent of /config/web — same data path that tofu
          # already uses in the initial body.
          MAX_INSTANCES=$(tofu output -raw function_app_cli_maximum_instance_count)
          MIN_INSTANCES=$(tofu output -raw function_app_cli_minimum_instance_count)
          if [ "$MIN_INSTANCES" -gt 0 ]; then
            ALWAYS_READY='[{"name":"http","instanceCount":'"${MIN_INSTANCES}"'}]'
          else
            ALWAYS_READY='[]'
          fi
          # Derive Durable Task work-items queue name from host.json so the KEDA
          # trigger stays in sync automatically if the hub name changes.
          DURABLE_HUB=$(jq -r '.extensions.durableTask.hubName // "DurableFunctionsHub"' \
            "${GITHUB_WORKSPACE}/host.json" | tr '[:upper:]' '[:lower:]')
          WORKITEMS_QUEUE="${DURABLE_HUB}-workitems"

          # CORS + scaling via the Function App (Microsoft.Web/sites) PATCH.
          # NOTE: functionAppConfig.scaleAndConcurrency.triggers is Flex-Consumption-only
          # and silently ignored for azurecontainerapps kind — KEDA triggers go below.
          PATCH_BODY=$(jq -cn \
            --argjson origins "$ALLOWED_ORIGINS_JSON" \
            --argjson max "$MAX_INSTANCES" \
            --argjson ready "$ALWAYS_READY" \
            '{properties:{siteConfig:{cors:{allowedOrigins:$origins,supportCredentials:false}},functionAppConfig:{scaleAndConcurrency:{maximumInstanceCount:$max,alwaysReady:$ready}}}}')
          FUNC_ID=$(az functionapp show --name "$FUNC_NAME" --resource-group "$FUNC_RG" --query id -o tsv)
          # Retry with fixed 20s delay: transient ARM 409 can still occur under concurrent platform writes.
          for attempt in 1 2 3; do
            if PATCH_ERROR=$(az rest --method PATCH --url "${FUNC_ID}?api-version=2024-04-01" --body "$PATCH_BODY" 2>&1); then
              break
            fi
            echo "$PATCH_ERROR"
            if echo "$PATCH_ERROR" | grep -qi "another operation is in progress"; then
              echo "::error title=Function App write blocked by stuck ARM operation::Cannot modify this site because another operation is in progress."
              echo "Recent Microsoft.Web/sites write activity for ${FUNC_NAME}:"
              az monitor activity-log list --resource-id "$FUNC_ID" --offset 24h --max-events 20 \
                --query "[?contains(operationName.value, 'Microsoft.Web/sites/write')].[eventTimestamp,status.value,operationId,correlationId]" \
                -o table || true
              echo "Next actions: retry once from Azure Portal; if lock persists >1h, open Azure Support with the operationId above (table column 3)."
              exit 1
            fi
            [ "$attempt" -lt 3 ] || { echo "❌ PATCH failed after 3 attempts"; exit 1; }
            echo "⚠️  PATCH attempt $attempt failed (transient ARM conflict), retrying in 20s..."
            sleep 20
          done

          # Verify scaling config applied
          ACTUAL=$(az rest --method GET --url "${FUNC_ID}?api-version=2024-04-01" \
            | jq '{max: .properties.functionAppConfig.scaleAndConcurrency.maximumInstanceCount, alwaysReady: (.properties.functionAppConfig.scaleAndConcurrency.alwaysReady // [])}')
          echo "Scaling config: $ACTUAL"

          # KEDA azure-queue scale trigger on the backing Container App resource.
          # For azurecontainerapps kind, scale triggers must go on
          # Microsoft.App/containerApps (not functionAppConfig which is Flex-only).
          # The system-assigned MI has Storage Queue Data Contributor on the storage
          # account so KEDA authenticates keylessly via identity=system (no shared key).
          STORAGE_ACCOUNT=$(tofu output -raw storage_account_name)
          CONTAINER_APP_ID="/subscriptions/${ARM_SUBSCRIPTION_ID}/resourceGroups/${FUNC_RG}/providers/Microsoft.App/containerApps/${FUNC_NAME}"

          # GET current Container App, inject scale rules, PATCH back.
          # PATCH avoids replacing the whole resource while preserving existing
          # containers/ingress/config and only updating the scale rules we own.
          CURRENT=$(az rest --method GET --url "${CONTAINER_APP_ID}?api-version=2024-03-01")
          PATCH_BODY=$(echo "$CURRENT" | jq \
            --arg  q   "$WORKITEMS_QUEUE" \
            --arg  sa  "$STORAGE_ACCOUNT" \
            --argjson max "$MAX_INSTANCES" \
            '{
              location: .location,
              tags: (.tags // {}),
              identity: .identity,
              properties: (
                .properties
                | .template.scale = {
                    minReplicas: 0,
                    maxReplicas: $max,
                    rules: [{
                      name: "durable-workitems",
                      custom: {
                        type: "azure-queue",
                        metadata: {
                          queueName: $q,
                          queueLength: "1",
                          accountName: $sa,
                          cloud: "AzurePublicCloud"
                        },
                        identity: "system"
                      }
                    }]
                  }
                | {
                    managedEnvironmentId: .managedEnvironmentId,
                    configuration: .configuration,
                    template: .template
                  }
              )
            }')
          for attempt in 1 2 3; do
            az rest --method PATCH \
              --url "${CONTAINER_APP_ID}?api-version=2024-03-01" \
              --body "$PATCH_BODY" && break
            [ "$attempt" -lt 3 ] || { echo "❌ Container App scale rules PATCH failed after 3 attempts"; exit 1; }
            echo "⚠️  PATCH attempt $attempt failed (transient ARM conflict), retrying in 20s..."
            sleep 20
          done

          # Verify KEDA scale rules applied
          RULES=$(az rest --method GET --url "${CONTAINER_APP_ID}?api-version=2024-03-01" \
            | jq '.properties.template.scale')
          echo "Container App scale config: $RULES"

      - name: Configure Orchestrator Function App
        id: configure-orch-app
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          FUNC_RG=$(tofu output -raw resource_group_name)
          ORCH_NAME=$(tofu output -raw function_app_orch_name)

          az functionapp config container set \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --image "${{ needs.build-image.outputs.orch_image_uri }}"

          mapfile -t APP_SETTINGS < <(
            tofu output -json function_app_cli_app_settings \
              | jq -r 'to_entries[] | "\(.key)=\(.value|tostring)"'
          )

          az webapp config appsettings set \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --settings "${APP_SETTINGS[@]}" PIPELINE_ROLE=orchestrator

          ALLOWED_ORIGINS_JSON=$(tofu output -json browser_allowed_origins | jq -c '.')
          if [ "$(echo "$ALLOWED_ORIGINS_JSON" | jq 'length')" -eq 0 ]; then
            echo "❌ Refusing to clear Orchestrator Function App CORS: browser_allowed_origins is empty"
            exit 1
          fi

          # Single PATCH combining CORS + scaling (same rationale as Configure Function App).
          MAX_INSTANCES=$(tofu output -raw function_app_cli_maximum_instance_count)
          ORCH_MIN_INSTANCES=$(tofu output -raw function_app_orch_minimum_instance_count)
          if [ "$ORCH_MIN_INSTANCES" -gt 0 ]; then
            ALWAYS_READY='[{"name":"http","instanceCount":'"${ORCH_MIN_INSTANCES}"'}]'
          else
            ALWAYS_READY='[]'
          fi
          PATCH_BODY=$(jq -cn \
            --argjson origins "$ALLOWED_ORIGINS_JSON" \
            --argjson max "$MAX_INSTANCES" \
            --argjson ready "$ALWAYS_READY" \
            '{properties:{siteConfig:{cors:{allowedOrigins:$origins,supportCredentials:false}},functionAppConfig:{scaleAndConcurrency:{maximumInstanceCount:$max,alwaysReady:$ready}}}}')
          ORCH_ID=$(az functionapp show --name "$ORCH_NAME" --resource-group "$FUNC_RG" --query id -o tsv)
          for attempt in 1 2 3; do
            if PATCH_ERROR=$(az rest --method PATCH --url "${ORCH_ID}?api-version=2024-04-01" --body "$PATCH_BODY" 2>&1); then
              break
            fi
            echo "$PATCH_ERROR"
            if echo "$PATCH_ERROR" | grep -qi "another operation is in progress"; then
              echo "::error title=Orchestrator Function App write blocked by stuck ARM operation::Cannot modify this site because another operation is in progress."
              echo "Recent Microsoft.Web/sites write activity for ${ORCH_NAME}:"
              az monitor activity-log list --resource-id "$ORCH_ID" --offset 24h --max-events 20 \
                --query "[?contains(operationName.value, 'Microsoft.Web/sites/write')].[eventTimestamp,status.value,operationId,correlationId]" \
                -o table || true
              echo "Next actions: retry once from Azure Portal; if lock persists >1h, open Azure Support with the operationId above (table column 3)."
              exit 1
            fi
            [ "$attempt" -lt 3 ] || { echo "❌ PATCH failed after 3 attempts"; exit 1; }
            echo "⚠️  PATCH attempt $attempt failed (transient ARM conflict), retrying in 20s..."
            sleep 20
          done

      - name: Verify Function App config contract
        id: verify-config-contract
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          set -euo pipefail

          FUNC_RG=$(tofu output -raw resource_group_name)
          FUNC_NAME=$(tofu output -raw function_app_name)
          ORCH_NAME=$(tofu output -raw function_app_orch_name)

          DESIRED_SETTINGS=$(tofu output -json function_app_cli_app_settings)

          verify_settings_subset() {
            local app_name="$1"
            local expected_json="$2"

            ACTUAL_SETTINGS_JSON=$(az webapp config appsettings list \
              --name "$app_name" \
              --resource-group "$FUNC_RG" \
              | jq 'map({(.name): .value}) | add')

            MISMATCHES=$(jq -n \
              --argjson expected "$expected_json" \
              --argjson actual "$ACTUAL_SETTINGS_JSON" \
              '[
                $expected
                | to_entries[]
                | select(($actual[.key] // null) != .value)
                | {
                    key: .key,
                    status: (if ($actual[.key] // null) == null then "missing" else "different" end)
                  }
              ]')

            if [ "$(echo "$MISMATCHES" | jq 'length')" -gt 0 ]; then
              echo "❌ App settings drift detected for $app_name"
              echo "Drifted keys (values redacted):"
              echo "$MISMATCHES" | jq '.'
              exit 1
            fi

            echo "✅ App settings contract verified for $app_name"
          }

          verify_container_image() {
            local app_name="$1"
            local expected_image="$2"
            local actual_linux_fx_version
            local normalized_actual_image
            local normalized_expected_image

            actual_linux_fx_version=$(az functionapp show \
              --name "$app_name" \
              --resource-group "$FUNC_RG" \
              --query 'siteConfig.linuxFxVersion' -o tsv)

            normalized_actual_image="${actual_linux_fx_version#DOCKER|}"
            normalized_expected_image="${expected_image#DOCKER|}"

            if [ "$normalized_actual_image" != "$normalized_expected_image" ]; then
              echo "❌ Container image drift for $app_name: expected=$expected_image actual=$actual_linux_fx_version"
              exit 1
            fi

            echo "✅ Container image contract verified for $app_name"
          }

          verify_identity_contract() {
            local app_name="$1"
            local identity_type
            local principal_id

            identity_type=$(az functionapp show \
              --name "$app_name" \
              --resource-group "$FUNC_RG" \
              --query 'identity.type' -o tsv)

            principal_id=$(az functionapp show \
              --name "$app_name" \
              --resource-group "$FUNC_RG" \
              --query 'identity.principalId' -o tsv)

            if [ "$identity_type" != "SystemAssigned" ]; then
              echo "❌ Managed identity type drift for $app_name: expected=SystemAssigned actual=${identity_type:-<missing>}"
              exit 1
            fi

            if [ -z "$principal_id" ]; then
              echo "❌ Managed identity principalId missing for $app_name"
              exit 1
            fi

            echo "✅ Managed identity contract verified for $app_name"
          }

          ORCH_SETTINGS=$(jq -n \
            --argjson base "$DESIRED_SETTINGS" \
            '$base + {"PIPELINE_ROLE":"orchestrator"}')

          verify_settings_subset "$FUNC_NAME" "$DESIRED_SETTINGS"
          verify_settings_subset "$ORCH_NAME" "$ORCH_SETTINGS"

          verify_container_image "$FUNC_NAME" "${{ needs.build-image.outputs.image_uri }}"
          verify_container_image "$ORCH_NAME" "${{ needs.build-image.outputs.orch_image_uri }}"

          # Fail fast on identity drift: this wiring is load-bearing for Key Vault refs,
          # storage RBAC, and durable pipeline access.
          verify_identity_contract "$FUNC_NAME"
          verify_identity_contract "$ORCH_NAME"

      - name: Verify browser CORS contract
        id: verify-browser-cors
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          RG_NAME=$(tofu output -raw resource_group_name)
          FUNC_HOST=$(tofu output -raw function_app_orch_default_hostname)
          STORAGE_NAME=$(tofu output -raw storage_account_name)
          ORIGINS_JSON=$(tofu output -json browser_allowed_origins)

          if [ "$(echo "$ORIGINS_JSON" | jq 'length')" -eq 0 ]; then
            echo "❌ browser_allowed_origins is empty; cannot verify browser CORS contract"
            exit 1
          fi

          # Only verify https:// origins — localhost entries are dev convenience
          # and cannot be meaningfully checked from a CI runner.
          while IFS= read -r origin; do
            echo "Checking Function App preflight for ${origin}"
            HEADERS=$(mktemp)
            STATUS=$(curl -sS -o /dev/null -D "$HEADERS" \
              -X OPTIONS "https://${FUNC_HOST}/api/upload/token" \
              -H "Origin: ${origin}" \
              -H 'Access-Control-Request-Method: POST' \
              -H 'Access-Control-Request-Headers: content-type,x-ms-client-principal' \
              -w '%{http_code}')
            ACAO=$(awk 'tolower($0) ~ /^access-control-allow-origin:/ {gsub(/\r/, "", $2); print $2}' "$HEADERS")
            rm -f "$HEADERS"
            # Azure Functions returns 200 or 204 for OPTIONS preflights.
            if { [ "$STATUS" != "200" ] && [ "$STATUS" != "204" ]; } || [ "$ACAO" != "$origin" ]; then
              echo "❌ Function App preflight failed for ${origin}: status=${STATUS} allow-origin=${ACAO:-<missing>}"
              exit 1
            fi
          done < <(echo "$ORIGINS_JSON" | jq -r '.[] | select(startswith("https://"))')

          BLOB_CORS_JSON=$(az storage account blob-service-properties show \
            --account-name "$STORAGE_NAME" \
            --resource-group "$RG_NAME" \
            --query 'cors.corsRules' -o json)

          if [ "$(echo "$BLOB_CORS_JSON" | jq '. // [] | length')" -eq 0 ]; then
            echo "❌ Blob service has no CORS rules configured"
            exit 1
          fi

          while IFS= read -r origin; do
            MATCH_COUNT=$(echo "$BLOB_CORS_JSON" | jq --arg origin "$origin" '[.[] | select((.allowedOrigins // []) | index($origin)) | select((.allowedMethods // []) | index("PUT")) | select((.allowedMethods // []) | index("OPTIONS"))] | length')
            if [ "$MATCH_COUNT" -eq 0 ]; then
              echo "❌ Blob CORS missing required origin or methods for ${origin}"
              exit 1
            fi
          done < <(echo "$ORIGINS_JSON" | jq -r '.[] | select(startswith("https://"))')

          echo "✅ Browser CORS contract verified for Function App preflight and blob service configuration."

      - name: Export Function App hostname
        id: hostname
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
