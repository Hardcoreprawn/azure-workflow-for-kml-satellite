          echo "Running internal smoke gate against ${SMOKE_URL}"
          echo "Smoke poll interval=${SMOKE_POLL_INTERVAL}s max_attempts=${SMOKE_MAX_ATTEMPTS}"

          for attempt in $(seq 1 "$SMOKE_MAX_ATTEMPTS"); do
            http_code=$(curl -sS --connect-timeout 5 --max-time 15 -o /tmp/internal-smoke.json -w "%{http_code}" "$SMOKE_URL" || echo "000")
            if [ "$http_code" = "200" ]; then
              echo "Internal smoke gate passed on attempt ${attempt}"
              cat /tmp/internal-smoke.json
              exit 0
            fi

            echo "Attempt ${attempt}/${SMOKE_MAX_ATTEMPTS} returned HTTP ${http_code}; retrying in ${SMOKE_POLL_INTERVAL}s"
            if [ "$attempt" = "$SMOKE_MAX_ATTEMPTS" ]; then
              echo "Internal smoke gate failed after ${SMOKE_MAX_ATTEMPTS} attempts"
              cat /tmp/internal-smoke.json || true
              exit 1
            fi
            sleep "$SMOKE_POLL_INTERVAL"
          done

      - name: Run pipeline smoke test
        id: pipeline-smoke
        if: env.DEPLOY_ENV != 'prd'
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
          SMOKE_POLL_INTERVAL: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_poll_interval_seconds || '5' }}
          SMOKE_MAX_ATTEMPTS: ${{ github.event_name == 'workflow_dispatch' && inputs.smoke_max_attempts || '60' }}
        run: |
          STORAGE_ACCOUNT=$(tofu output -raw storage_account_name)
          ORCH_HOSTNAME=$(tofu output -raw function_app_orch_default_hostname)
          ORCH_APP_NAME=$(tofu output -raw function_app_orch_name)
          RG_NAME=$(tofu output -raw resource_group_name)
          python ../../scripts/pipeline_smoke.py \
            --storage-account "$STORAGE_ACCOUNT" \
            --orch-hostname "$ORCH_HOSTNAME" \
            --resource-group "$RG_NAME" \
            --orch-app-name "$ORCH_APP_NAME" \
            --kml-file ../../tests/fixtures/single_polygon.kml \
            --max-attempts "$SMOKE_MAX_ATTEMPTS" \
            --poll-interval "$SMOKE_POLL_INTERVAL"

      # ── Safe deploy: rollback to previous image on readiness failure ──
      - name: Rollback to previous image
        if: |
          failure()
          && (steps.configure-app.outcome == 'success' || steps.configure-orch-app.outcome == 'success')
          && (steps.current-image.outputs.image_compute != '' || steps.current-image.outputs.image_orch != '')
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          PREV_COMPUTE_IMAGE="${{ steps.current-image.outputs.image_compute }}"
          PREV_ORCH_IMAGE="${{ steps.current-image.outputs.image_orch }}"
          FUNC_NAME="${{ steps.current-image.outputs.func_name }}"
          ORCH_NAME="${{ steps.current-image.outputs.orch_name }}"
          FUNC_RG="${{ steps.current-image.outputs.func_rg }}"

          echo "⚠️ Readiness checks failed — rolling back to previous images."

          if [ -n "$PREV_COMPUTE_IMAGE" ] && [ "${{ steps.configure-app.outcome }}" = "success" ]; then
            echo "  Compute previous: ${PREV_COMPUTE_IMAGE}"
            echo "  Compute failed:   ${{ needs.build-image.outputs.image_uri }}"
            az functionapp config container set \
              --name "$FUNC_NAME" \
              --resource-group "$FUNC_RG" \
              --image "$PREV_COMPUTE_IMAGE"
          fi

          if [ -n "$PREV_ORCH_IMAGE" ] && [ "${{ steps.configure-orch-app.outcome }}" = "success" ]; then
            echo "  Orchestrator previous: ${PREV_ORCH_IMAGE}"
            echo "  Orchestrator failed:   ${{ needs.build-image.outputs.orch_image_uri }}"
            az functionapp config container set \
              --name "$ORCH_NAME" \
              --resource-group "$FUNC_RG" \
              --image "$PREV_ORCH_IMAGE"
          fi

          check_health() {
            local role="$1"
            local hostname="$2"
            local base_url="https://${hostname}"
            for i in $(seq 1 12); do
              sleep 10
              code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${base_url}/api/health" 2>/dev/null || echo "000")
              echo "  ${role} [${i}0s] health=${code}"
              if [ "$code" = "200" ]; then
                return 0
              fi
            done
            return 1
          }

          COMPUTE_HOSTNAME="${{ steps.compute-hostname.outputs.hostname }}"
          ORCH_HOSTNAME="${{ steps.hostname.outputs.hostname }}"

          if [ -z "$COMPUTE_HOSTNAME" ]; then
            COMPUTE_HOSTNAME=$(tofu output -raw function_app_default_hostname)
          fi
          if [ -z "$ORCH_HOSTNAME" ]; then
            ORCH_HOSTNAME=$(tofu output -raw function_app_orch_default_hostname)
          fi

          if [ -z "$COMPUTE_HOSTNAME" ] || [ -z "$ORCH_HOSTNAME" ]; then
            echo "❌ Rollback health verification could not resolve function app hostnames."
            exit 1
          fi

          echo "Waiting for rolled-back containers to become healthy..."
          if ! check_health "compute" "$COMPUTE_HOSTNAME"; then
            echo "⚠️ Compute rollback applied but health did not recover within 120s."
            exit 1
          fi
          if ! check_health "orchestrator" "$ORCH_HOSTNAME"; then
            echo "⚠️ Orchestrator rollback applied but health did not recover within 120s."
            exit 1
          fi

          echo "✅ Rollback successful — both previous images are healthy."

      - name: Rollback orchestrator to previous image
        if: failure() && steps.configure-orch-app.outcome == 'success' && steps.current-orch-image.outputs.image != ''
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          PREV_IMAGE="${{ steps.current-orch-image.outputs.image }}"
          ORCH_NAME="${{ steps.current-orch-image.outputs.func_name }}"
          FUNC_RG="${{ steps.current-orch-image.outputs.func_rg }}"

          echo "⚠️ Readiness checks failed — rolling back orchestrator to previous image."
          echo "  Previous: ${PREV_IMAGE}"
          echo "  Failed:   ${{ needs.build-image.outputs.orch_image_uri }}"

          az functionapp config container set \
            --name "$ORCH_NAME" \
            --resource-group "$FUNC_RG" \
            --image "$PREV_IMAGE"

          # Wait for the rollback to take effect
          echo "Waiting for rolled-back orchestrator container to become healthy..."
          HOSTNAME="${{ steps.hostname.outputs.hostname }}"
          BASE_URL="https://${HOSTNAME}"
          for i in $(seq 1 12); do
            sleep 10
            code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 5 "${BASE_URL}/api/health" 2>/dev/null || echo "000")
            echo "  [${i}0s] health=${code}"
            if [ "$code" = "200" ]; then
              echo "✅ Orchestrator rollback successful — previous image is healthy."
              exit 0
            fi
          done
          echo "⚠️ Orchestrator rollback applied but health check did not recover within 120s."
          echo "  Manual intervention may be required."
          exit 1

  # ── 3. Deploy static website ───────────────────────────────
  deploy-website:
    name: Deploy Static Website
    runs-on: ubuntu-latest
    needs: deploy-infra
    environment: ${{ github.event.inputs.environment || 'dev' }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v6

      - name: Azure Login (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Inject API config
        run: |
          cat > website/api-config.json <<EOF
          {"apiBase": "https://${{ needs.deploy-infra.outputs.function_app_orch_hostname }}", "lastVerified": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"}
          EOF

      - name: Inject analytics config
        env:
          AI_CONNECTION_STRING: ${{ needs.deploy-infra.outputs.appinsights_connection_string }}
        run: |
          if [ -n "$AI_CONNECTION_STRING" ]; then
            find website -name '*.html' -exec sed -i \
              's|name="ai-connection-string" content=""|name="ai-connection-string" content="'"$AI_CONNECTION_STRING"'"|' {} +
          fi

      - name: Inject CIAM config
        env:
          CIAM_JSON: ${{ needs.deploy-infra.outputs.ciam_page_config }}
        run: |
          set -euo pipefail
          # CIAM page config is a JSON blob produced by `tofu output -raw
          # ciam_page_config` (see locals.ciam_page_config_json). Values are
          # public; no secret-store round-trip required. Empty JSON disables
          # the page config rather than failing the deploy.
          if [ -z "$CIAM_JSON" ] || [ "$CIAM_JSON" = "{}" ]; then
            echo "❌ ciam_page_config Tofu output is empty — CIAM config will NOT be injected."
            echo "   This means the deployed site will have auth disabled for all users."
            echo "   Verify that ciam_client_id, ciam_tenant_id, ciam_api_audience, and"
            echo "   ciam_tenant_subdomain are all set in environments/<env>.tfvars and"
            echo "   that 'tofu output -raw ciam_page_config' returns a non-empty value."
            exit 1
          fi
          # Escape sed delimiter / metacharacters in the JSON payload.
          ESCAPED=$(printf '%s' "$CIAM_JSON" | sed -e 's/[\&|]/\\&/g')
          find website -name '*.html' -exec sed -i \
            's|{"clientId":"","authority":"","tenantId":"","apiAudience":""}|'"${ESCAPED}"'|' {} +

      - name: Inject CSP hostnames
        run: |
          set -euo pipefail
          FUNC_HOST="${{ needs.deploy-infra.outputs.function_app_orch_hostname }}"
          STORAGE_NAME="${{ needs.deploy-infra.outputs.storage_account_name }}"
          if [ -z "$FUNC_HOST" ] || [ -z "$STORAGE_NAME" ]; then
            echo "❌ CSP hostname substitution failed: function_app_orch_hostname or storage_account_name is empty."
            exit 1
          fi
          BLOB_HOST="${STORAGE_NAME}.blob.core.windows.net"
          sed -i \
            -e "s|__FUNC_HOSTNAME__|${FUNC_HOST}|g" \
            -e "s|__BLOB_HOSTNAME__|${BLOB_HOST}|g" \
            website/staticwebapp.config.json
          echo "✅ CSP pinned: connect-src allows ${FUNC_HOST} and ${BLOB_HOST}"

      - name: Deploy to Azure Static Web Apps
        id: swa-deploy
        continue-on-error: true
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /website
          skip_app_build: true

      # Azure SWA upload can stall with a hard 600s server-side timeout on slow days.
      # Retry once — the re-upload is fast if the previous attempt partially staged content.
      - name: Deploy to Azure Static Web Apps (retry on timeout)
        if: steps.swa-deploy.outcome == 'failure'
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /website
          skip_app_build: true

      - name: Smoke-check Container Apps Function App
        run: |
          FA_HOSTNAME="${{ needs.deploy-infra.outputs.function_app_orch_hostname }}"
          BASE_URL="https://${FA_HOSTNAME}"
          echo "Checking Container Apps FA at ${BASE_URL}..."

          # Verify health endpoint returns 200 (proves function app is running)
          for i in $(seq 1 6); do
            HEALTH=$(curl -s -o /dev/null -w '%{http_code}' --max-time 10 \
              "${BASE_URL}/api/health" 2>/dev/null || echo "000")
            echo "  [attempt ${i}] GET /api/health → HTTP ${HEALTH}"
            if [ "$HEALTH" = "200" ]; then
              echo "✅ Container Apps FA health endpoint responding"
              break
            fi
            sleep 10
          done
          if [ "$HEALTH" != "200" ]; then
            echo "❌ FA health endpoint did not return 200 within 60s (got ${HEALTH})"
            exit 1
          fi
