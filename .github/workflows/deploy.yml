---
# ---------------------------------------------------------------------------
# Function App Deployment — Container
# ---------------------------------------------------------------------------
# Builds a Docker image with GDAL and geospatial libraries, pushes it to
# GitHub Container Registry (ghcr.io), and deploys the container to Azure
# Functions on Container Apps.
#
# IMPORTANT sequencing guardrail:
#   Event Grid subscription must be created only after the target function
#   (kml_blob_trigger) is discoverable by the Functions host. ARM/Bicep
#   dependencies cannot model runtime function indexing state, so deployment
#   is intentionally split into two passes:
#     1) Deploy infra + function app (Event Grid subscription disabled)
#     2) Wait for function discovery and verify kml_blob_trigger exists
#     3) Re-apply infra with Event Grid subscription enabled
#
# Triggers on push to main when application code or Dockerfile changes.
#
# Safety: main branch protection requires the lint-and-test CI check to pass
# before any PR can merge, so code on main has already been validated.
#
# Container security:
#   - Multi-stage build: build tools never reach the final image
#   - No secrets in the image: all config injected via app settings
#   - Images tagged with commit SHA for full traceability
#   - GITHUB_TOKEN for ghcr.io push — no stored credentials
#   - .dockerignore excludes .git, tests, infra, local settings
#
# Requires:
#   - OIDC federation configured (same as infra.yml)
#   - GitHub environment secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID,
#     AZURE_SUBSCRIPTION_ID
#   - GitHub environment variable: AZURE_LOCATION
# ---------------------------------------------------------------------------

name: Deploy Function App

on:
  push:
    branches: [main]
    paths:
      - "function_app.py"
      - "kml_satellite/**"
      - "host.json"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  packages: write

env:
  FUNCTION_APP_NAME: func-kmlsat-dev
  RESOURCE_GROUP: rg-kmlsat-dev

jobs:
  deploy-dev:
    name: Deploy (Dev)
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set container image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy container image (Event Grid subscription disabled)
        run: |
          az deployment sub create \
            --location ${{ vars.AZURE_LOCATION || 'uksouth' }} \
            --template-file infra/main.bicep \
            --parameters infra/parameters/dev.bicepparam \
            --parameters enableEventGridSubscription=false \
            --parameters containerImage='${{ steps.image.outputs.name }}' \
            --name "deploy-$(date +%Y%m%d-%H%M%S)"

      - name: Wait for kml_blob_trigger to be discoverable
        run: |
          echo "Waiting for function app to recognise deployed functions..."
          last_error=""
          start_time=$(date +%s)
          max_duration=300  # 5 minutes wall-clock timeout
          max_attempts=30
          found=0

          for i in $(seq 1 $max_attempts); do
            elapsed=$(($(date +%s) - start_time))
            if [ "$elapsed" -ge "$max_duration" ]; then
              echo "::warning::Wall-clock timeout reached (${elapsed}s) - function not yet discoverable"
              break
            fi

            set +e
            function_names=$(az functionapp function list \
              --name "${{ env.FUNCTION_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "[].name" -o tsv 2>&1)
            az_status=$?
            set -e

            if [ "$az_status" -ne 0 ]; then
              last_error="$function_names"
              echo "  attempt $i/$max_attempts (${elapsed}s) — az CLI error, retrying in 10s…"
              echo "    error: $last_error"
              sleep 10
              continue
            fi

            if echo "$function_names" | grep -q '/kml_blob_trigger$'; then
              total=$(echo "$function_names" | grep -c . || true)
              echo "✔ kml_blob_trigger detected after attempt $i ($total function(s) discovered, ${elapsed}s elapsed)"
              found=1
              break
            fi
            total=$(echo "$function_names" | grep -c . || true)
            echo "  attempt $i/$max_attempts (${elapsed}s) — kml_blob_trigger not yet indexed ($total function(s) discovered), retrying in 10s…"
            sleep 10
          done

          total_elapsed=$(($(date +%s) - start_time))
          if [ "$found" -ne 1 ]; then
            echo "::warning::kml_blob_trigger not discoverable after ${total_elapsed}s; continuing to Event Grid enable retries"
            if [ -n "$last_error" ]; then
              echo "::warning::Last az CLI error during discovery: $last_error"
            fi
          fi

      - name: Enable Event Grid subscription (retry until endpoint validates)
        run: |
          success=0
          last_error=""
          start_time=$(date +%s)
          max_duration=900  # 15 minutes wall-clock timeout
          max_attempts=15

          echo "Starting Event Grid enablement with wall-clock timeout of ${max_duration}s (${max_attempts} attempts max)"

          for i in $(seq 1 $max_attempts); do
            elapsed=$(($(date +%s) - start_time))
            if [ "$elapsed" -ge "$max_duration" ]; then
              echo "::error::Wall-clock timeout reached (${elapsed}s >= ${max_duration}s) at attempt $i"
              break
            fi

            attempt_start=$(date +%s)
            echo "Attempt $i/$max_attempts (elapsed: ${elapsed}s)..."

            set +e
            deploy_output=$(az deployment sub create \
              --location ${{ vars.AZURE_LOCATION || 'uksouth' }} \
              --template-file infra/main.bicep \
              --parameters infra/parameters/dev.bicepparam \
              --parameters enableEventGridSubscription=true \
              --parameters containerImage='${{ steps.image.outputs.name }}' \
              --name "deploy-eg-$(date +%Y%m%d-%H%M%S)-$i" 2>&1)
            deploy_status=$?
            set -e

            attempt_duration=$(($(date +%s) - attempt_start))
            echo "  Deployment attempt took ${attempt_duration}s (exit code: $deploy_status)"

            if [ "$deploy_status" -eq 0 ]; then
              total_elapsed=$(($(date +%s) - start_time))
              echo "✔ Event Grid subscription enabled after attempt $i/$max_attempts (${total_elapsed}s elapsed)"
              success=1
              break
            fi

            last_error="$deploy_output"

            # Fail-fast: detect non-transient errors
            if echo "$deploy_output" | grep -qi "authorization\|forbidden\|invalid\scredential"; then
              echo "::error::Non-transient error detected (auth/permission) - failing fast"
              echo "$deploy_output" | tail -n 8
              break
            fi

            # Check if error is endpoint validation (expected transient)
            if echo "$deploy_output" | grep -qi "destination.*not.*found\|endpoint.*validation"; then
              echo "  Endpoint validation failed (transient) - function not yet ready"
            else
              echo "  Unexpected error pattern:"
            fi
            echo "$deploy_output" | tail -n 8

            # Exponential backoff: 10s, 20s, 30s, capped at 60s
            backoff=$((10 * i))
            if [ "$backoff" -gt 60 ]; then
              backoff=60
            fi

            # Don't sleep on last attempt or if near timeout
            if [ "$i" -lt "$max_attempts" ]; then
              remaining=$((max_duration - elapsed - backoff))
              if [ "$remaining" -lt 0 ]; then
                echo "  Approaching timeout, final attempt without backoff"
              else
                echo "  Backing off ${backoff}s before next attempt..."
                sleep "$backoff"
              fi
            fi
          done

          total_elapsed=$(($(date +%s) - start_time))
          if [ "$success" -ne 1 ]; then
            echo "::error::Failed to enable Event Grid subscription after $max_attempts attempts (${total_elapsed}s elapsed, ${max_duration}s timeout)"
            if [ -n "$last_error" ]; then
              echo "::error::Last deployment error:"
              echo "$last_error"
            fi
            exit 1
          fi

      - name: Verify Event Grid subscription exists
        run: |
          sub_id=$(az eventgrid system-topic event-subscription list \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --system-topic-name "evgt-kmlsat-dev" \
            --query "[?name=='evgs-kml-upload'].id | [0]" -o tsv)
          if [ -z "$sub_id" ]; then
            echo "::error::Expected event subscription evgs-kml-upload was not found"
            exit 1
          fi
          echo "✔ Event subscription verified: $sub_id"
