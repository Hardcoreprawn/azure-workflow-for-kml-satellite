---
# ---------------------------------------------------------------------------
# Function App Container Image Build & Deployment
# ---------------------------------------------------------------------------
# Builds a Docker image with GDAL and geospatial libraries, pushes it to
# GitHub Container Registry (ghcr.io), and updates the Function App container.
#
# Infrastructure (Function App, Event Grid, etc.) is managed via OpenTofu
# in the tofu-apply.yml workflow.
#
# Container security:
#   - Multi-stage build: build tools never reach final image
#   - No secrets in image: all config injected via app settings
#   - Images tagged with commit SHA for full traceability
#
# Requires:
#   - OIDC federation configured for this workflow
#   - GitHub environment secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID,
#     AZURE_SUBSCRIPTION_ID
# ---------------------------------------------------------------------------

name: Deploy Function App

on:
  push:
    branches: [main]
    paths:
      - "function_app.py"
      - "kml_satellite/**"
      - "host.json"
      - "requirements.txt"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy.yml"
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read
  packages: write

env:
  FUNCTION_APP_NAME: func-kmlsat-dev
  RESOURCE_GROUP: rg-kmlsat-dev

jobs:
  deploy-dev:
    name: Deploy (Dev)
    runs-on: ubuntu-latest
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set container image name
        id: image
        run: |
          echo "name=ghcr.io/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push container image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.name }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Function App container image
        run: |
          az functionapp config container set \
            --name ${{ env.FUNCTION_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --docker-custom-image-name '${{ steps.image.outputs.name }}' \
            --docker-registry-server-url 'https://ghcr.io' \
            --docker-registry-server-user ${{ github.actor }} \
            --docker-registry-server-password '${{ secrets.GITHUB_TOKEN }}'

      - name: Wait for Function App to be healthy
        shell: bash
        run: |
          set -euo pipefail
          FUNCTION_APP="${{ env.FUNCTION_APP_NAME }}"
          RESOURCE_GROUP="${{ env.RESOURCE_GROUP }}"
          MAX_ATTEMPTS=60
          ATTEMPT=0

          FQDN=$(az functionapp show \
            --name "$FUNCTION_APP" \
            --resource-group "$RESOURCE_GROUP" \
            --query "defaultHostName" -o tsv)

          echo "Waiting for Function App to be healthy at https://${FQDN}/api/health..."

          while [[ $ATTEMPT -lt $MAX_ATTEMPTS ]]; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://${FQDN}/api/health" || echo "000")
            echo "  Attempt $((ATTEMPT+1))/$MAX_ATTEMPTS: HTTP $HTTP_CODE"

            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "✅ Function App is healthy!"
              curl -s "https://${FQDN}/api/health" | jq . || true
              exit 0
            fi

            ATTEMPT=$((ATTEMPT+1))
            sleep 5
          done

          echo "❌ Function App did not become healthy within timeout"
          exit 1
