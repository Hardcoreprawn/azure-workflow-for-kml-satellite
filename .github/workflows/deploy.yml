          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          echo "name=$(tofu output -raw storage_account_name)" >> "$GITHUB_OUTPUT"

      - name: Verify runtime readiness
        id: verify-readiness
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          set -euo pipefail
          MAX_WAIT=300          # container startup + route registration can exceed 90s under cold start
          INTERVAL=5
          COMPUTE_HOSTNAME=$(tofu output -raw function_app_default_hostname)
          ORCH_HOSTNAME=$(tofu output -raw function_app_orch_default_hostname)

          probe_code() {
            local url="$1"
            local code
            # curl prints 000 on connection errors; avoid `|| echo 000` which can
            # produce 000000 and obscure diagnostics.
            code=$(curl -s -o /dev/null -w '%{http_code}' --connect-timeout 3 --max-time 8 "$url" 2>/dev/null || true)
            if [[ "$code" =~ ^[0-9]{3}$ ]]; then
              echo "$code"
            else
              echo "000"
            fi
          }

          verify_host_readiness() {
            local role="$1"
            local hostname="$2"
            local base_url="https://${hostname}"
            local elapsed=0
            local health_code=0
            local ready_code=0

            echo "Waiting for ${role} runtime ${base_url}/api/health to become ready..."

            while [ $elapsed -lt $MAX_WAIT ]; do
              health_code=$(probe_code "${base_url}/api/health")
              ready_code=$(probe_code "${base_url}/api/readiness")

              echo "  ${role} [${elapsed}s] health=${health_code} readiness=${ready_code}"

              if [ "$health_code" = "200" ] && [ "$ready_code" = "200" ]; then
                echo "✅ ${role} runtime is healthy and ready."
                HEALTH_BODY=$(curl -s --max-time 5 "${base_url}/api/health" 2>/dev/null || true)
                echo "  ${role} deployed version: $(echo "$HEALTH_BODY" | jq -r '.version // "unknown"') ($(echo "$HEALTH_BODY" | jq -r '.commit // "unknown"'))"
                return 0
              fi

              # Fail fast on real server errors — but tolerate 502/503/504 which
              # are normal during Container Apps cold start + Python worker init.
              if [[ "$health_code" =~ ^5 ]] && ! [[ "$health_code" =~ ^50[234]$ ]]; then
                echo "❌ ${role} server error (health=${health_code}). Failing."
                return 1
              fi
              if [[ "$ready_code" =~ ^5 ]] && ! [[ "$ready_code" =~ ^50[234]$ ]]; then
                echo "❌ ${role} server error (readiness=${ready_code}). Failing."
                return 1
              fi

              # 502/503/504 / 404 / 000 — transient during cold start, keep waiting
              sleep $INTERVAL
              elapsed=$((elapsed + INTERVAL))
            done

            echo ""
            echo "❌ ${role} readiness checks did not pass within ${MAX_WAIT}s."
            echo "── ${role} endpoint probe matrix ──"
            echo "  health:    ${health_code}"
            echo "  readiness: ${ready_code}"
            echo "  elapsed:   ${elapsed}s"
            echo "  hostname:  ${hostname}"
            echo ""
            echo "── DNS lookup (${role}) ──"
            getent hosts "${hostname}" || true
            echo ""
            echo "── Final curl diagnostics (${role} /api/health) ──"
            curl -sv --connect-timeout 5 --max-time 10 "${base_url}/api/health" -o /dev/null 2>&1 | tail -n 40 || true
            echo ""
            echo "This may indicate:"
            echo "  - Container image failed to start (check Container Apps logs)"
            echo "  - Route registration lag exceeded timeout"
            echo "  - The function app hostname has changed"
            return 1
          }

          verify_host_readiness "compute" "$COMPUTE_HOSTNAME" &
          COMPUTE_PID=$!
          verify_host_readiness "orchestrator" "$ORCH_HOSTNAME" &
          ORCH_PID=$!

          set +e
          wait "$COMPUTE_PID"
          COMPUTE_STATUS=$?
          wait "$ORCH_PID"
          ORCH_STATUS=$?
          set -e

          if [ "$COMPUTE_STATUS" -ne 0 ] || [ "$ORCH_STATUS" -ne 0 ]; then
            echo "❌ Runtime readiness failed (compute=${COMPUTE_STATUS}, orchestrator=${ORCH_STATUS})"
            exit 1
          fi

          echo "✅ Runtime readiness verified for compute and orchestrator in parallel."

      - name: Reconcile Event Grid subscription
