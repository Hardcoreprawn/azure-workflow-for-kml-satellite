# ---------------------------------------------------------------------------
# E2E Pipeline Test — Live environment verification
# ---------------------------------------------------------------------------
# Runs after every successful deploy to main. Uploads real KML files to
# Azure blob storage and verifies the complete pipeline (ingest → acquire
# → fulfill) runs to completion with correct output artifacts.
#
# If the deployed environment is not reachable, individual tests skip via
# pytest.mark.skipif — the workflow step itself never soft-fails silently;
# any unexpected exception causes a hard failure.
#
# Requires:
#   - OIDC federation configured for the 'dev' environment
#   - GitHub environment secrets: AZURE_CLIENT_ID, AZURE_TENANT_ID,
#     AZURE_SUBSCRIPTION_ID
# ---------------------------------------------------------------------------

name: E2E Pipeline Test

on:
  workflow_run:
    workflows: ["Deploy Function App"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  FUNCTION_APP_NAME: func-kmlsat-dev
  RESOURCE_GROUP: rg-kmlsat-dev

jobs:
  e2e-test:
    name: Live E2E (Dev)
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 45
    if: |
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve live environment values
        id: env
        shell: bash
        run: |
          set -euo pipefail

          log() { echo "$(date +'%H:%M:%S') | $*"; }
          fail() { echo "::error::$*"; exit 1; }

          HOSTNAME=$(az functionapp show \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query defaultHostName -o tsv)
          [[ -n "$HOSTNAME" ]] || fail "Could not resolve Function App hostname"
          log "Function App hostname: $HOSTNAME"

          STORAGE_ACCOUNT=$(az storage account list \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "[0].name" -o tsv)
          [[ -n "$STORAGE_ACCOUNT" ]] || fail "Could not resolve storage account name"
          STORAGE_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net"
          log "Storage account URL: $STORAGE_URL"

          # Retrieve default host key for the Durable management API.
          HOST_KEY=$(az functionapp keys list \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "functionKeys.default" -o tsv 2>/dev/null || true)

          if [[ -z "$HOST_KEY" ]]; then
            # Fallback: try the master key if default is not separately listed.
            HOST_KEY=$(az functionapp keys list \
              --name "${{ env.FUNCTION_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "masterKey" -o tsv)
          fi
          [[ -n "$HOST_KEY" ]] || fail "Could not retrieve function host key"

          echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"
          echo "storage_url=${STORAGE_URL}" >> "$GITHUB_OUTPUT"
          # Mask the key so it never appears in logs.
          echo "::add-mask::${HOST_KEY}"
          echo "host_key=${HOST_KEY}" >> "$GITHUB_OUTPUT"

      - name: Run live E2E tests
        env:
          E2E_FUNCTION_APP_HOSTNAME: ${{ steps.env.outputs.hostname }}
          E2E_STORAGE_ACCOUNT_URL: ${{ steps.env.outputs.storage_url }}
          E2E_FUNCTION_HOST_KEY: ${{ steps.env.outputs.host_key }}
        run: |
          uv run pytest tests/integration/ -m e2e -v --tb=short
