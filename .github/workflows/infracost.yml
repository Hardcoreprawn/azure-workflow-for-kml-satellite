# ─────────────────────────────────────────────────────────────
# Infracost — Cost estimation for infrastructure changes
#
# Runs on PRs that touch infra/tofu/** files. Collects live
# Azure usage metrics, generates a cost estimate, and posts
# a PR comment with the diff vs current baseline.
#
# Required GitHub Secrets (set in 'dev' environment):
#   AZURE_CLIENT_ID           — SP / managed identity client ID (OIDC)
#   AZURE_TENANT_ID           — Azure AD tenant
#   AZURE_SUBSCRIPTION_ID     — Target subscription
#   TF_STATE_RESOURCE_GROUP   — Resource group holding tfstate storage
#   TF_STATE_STORAGE_ACCOUNT  — Storage account name for tfstate
#   TF_STATE_CONTAINER_DEV    — Blob container name for tfstate (dev)
#   TF_STATE_KEY_DEV          — Blob key for the state file (dev)
#   INFRACOST_API_KEY         — Infracost Cloud API key (free tier)
#   DEV_RESOURCE_GROUP        — Resource group name for usage metrics
# ─────────────────────────────────────────────────────────────
name: Infracost

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/tofu/**"

permissions:
  contents: read
  id-token: write          # OIDC auth to Azure
  pull-requests: write     # post PR comment

env:
  TOFU_VERSION: "1.8.0"
  PYTHON_VERSION: "3.12"
  BUDGET_GBP: "10"

jobs:
  infracost:
    name: Cost Estimate
    runs-on: ubuntu-latest
    environment: dev
    env:
      TF_VAR_deploy_principal_client_id: ${{ secrets.AZURE_CLIENT_ID }}
      TF_VAR_auth_mode: ${{ secrets.TF_VAR_AUTH_MODE || 'legacy_principal' }}
      TF_VAR_ciam_authority: ${{ secrets.TF_VAR_CIAM_AUTHORITY || '' }}
      TF_VAR_ciam_tenant_id: ${{ secrets.TF_VAR_CIAM_TENANT_ID || '' }}
      TF_VAR_ciam_api_audience: ${{ secrets.TF_VAR_CIAM_API_AUDIENCE || '' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      # ── Azure auth (OIDC) — needed for tofu plan + metrics ──
      - name: Azure Login (OIDC)
        id: azure_login
        continue-on-error: true
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # ── Collect live usage metrics ─────────────────────────
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        if: steps.azure_login.outcome == 'success'
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install metrics collection dependencies
        if: steps.azure_login.outcome == 'success'
        run: |
          python -m pip install --upgrade pip
          python -m pip install \
            azure-identity \
            'azure-monitor-query>=1.4,<2' \
            azure-mgmt-resource

      - name: Collect Azure usage metrics
        if: steps.azure_login.outcome == 'success'
        run: |
          python -c "from azure.identity import DefaultAzureCredential; print('SDK import OK')"
          python scripts/collect_infracost_usage.py \
            --subscription-id "${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            --resource-group "${{ secrets.DEV_RESOURCE_GROUP }}" \
            --lookback 31 \
            --output infra/tofu/infracost-usage.yml

      # ── OpenTofu plan ──────────────────────────────────────
      - name: Setup OpenTofu
        if: steps.azure_login.outcome == 'success'
        uses: opentofu/setup-opentofu@fc711fa910b93cba0f3fbecaafc9f42fd0c411cb # v2.0.0
        with:
          tofu_version: ${{ env.TOFU_VERSION }}

      - name: Validate CIAM auth env wiring
        if: steps.azure_login.outcome == 'success'
        shell: bash
        run: |
          trim_space() {
            local value="${1-}"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }
          set -euo pipefail
          mode="${TF_VAR_auth_mode:-legacy_principal}"
          case "$mode" in
            legacy_principal) ;;
            dual|bearer_only)
              ciam_authority="$(trim_space "${TF_VAR_ciam_authority:-}")"
              ciam_tenant_id="$(trim_space "${TF_VAR_ciam_tenant_id:-}")"
              ciam_api_audience="$(trim_space "${TF_VAR_ciam_api_audience:-}")"
              if [[ -z "$ciam_authority" || -z "$ciam_tenant_id" || -z "$ciam_api_audience" ]]; then
                echo "CIAM auth misconfigured: TF_VAR_auth_mode=${mode} requires TF_VAR_ciam_authority, TF_VAR_ciam_tenant_id, and TF_VAR_ciam_api_audience."
                exit 1
              fi
              ;;
            *)
              echo "Invalid TF_VAR_auth_mode='${mode}'. Expected legacy_principal, dual, or bearer_only."
              exit 1
              ;;
          esac

      - name: Cache OpenTofu providers
        if: steps.azure_login.outcome == 'success'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: infra/tofu/.terraform/providers
          key: tofu-providers-${{ hashFiles('infra/tofu/.terraform.lock.hcl') }}
          restore-keys: tofu-providers-

      - name: Tofu Init
        if: steps.azure_login.outcome == 'success'
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          MAX_RETRIES=3
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "tofu init attempt ${attempt}/${MAX_RETRIES}"
            if tofu init \
              -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
              -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
              -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER_DEV }}" \
              -backend-config="key=${{ secrets.TF_STATE_KEY_DEV }}"; then
              echo "✅ tofu init succeeded on attempt ${attempt}"
              exit 0
            fi
            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "⚠️ tofu init failed, retrying in 10s..."
              sleep 10
            fi
          done
          echo "❌ tofu init failed after ${MAX_RETRIES} attempts"
          exit 1

      - name: Tofu Plan (JSON)
        if: steps.azure_login.outcome == 'success'
        working-directory: infra/tofu
        env:
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          ARM_USE_OIDC: "true"
        run: |
          tofu plan -out=tfplan \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var="deploy_principal_client_id=${{ secrets.AZURE_CLIENT_ID }}" \
            -var-file="environments/dev.tfvars"
          tofu show -json tfplan > plan.json

      # ── Infracost ──────────────────────────────────────────
      - name: Setup Infracost
        if: steps.azure_login.outcome == 'success'
        uses: infracost/actions/setup@9accc4137ae3f13ede9182e0afa2bed39a23c4c0 # v4
        with:
          api-key: ${{ secrets.INFRACOST_API_KEY }}

      - name: Generate Infracost breakdown
        if: steps.azure_login.outcome == 'success'
        working-directory: infra/tofu
        env:
          INFRACOST_CURRENCY: GBP
        run: |
          infracost breakdown \
            --path=plan.json \
            --usage-file=infracost-usage.yml \
            --format=json \
            --out-file=/tmp/infracost-base.json

      - name: Post PR comment
        if: steps.azure_login.outcome == 'success'
        run: |
          infracost comment github \
            --path=/tmp/infracost-base.json \
            --repo="${{ github.repository }}" \
            --github-token="${{ github.token }}" \
            --pull-request="${{ github.event.pull_request.number }}" \
            --behavior=update \
            --tag=infracost

      # ── Budget gate ────────────────────────────────────────
      - name: Check budget threshold
        if: steps.azure_login.outcome == 'success'
        run: |
          MONTHLY=$(infracost output \
            --path=/tmp/infracost-base.json \
            --format=json \
            | jq -r '.totalMonthlyCost // "0"')

          echo "Estimated monthly cost: £${MONTHLY}"
          echo "Budget threshold: £${{ env.BUDGET_GBP }}"

          if (( $(echo "$MONTHLY > ${{ env.BUDGET_GBP }}" | bc -l) )); then
            echo "::warning::Estimated cost (£${MONTHLY}) exceeds budget (£${{ env.BUDGET_GBP }}/month)"
            # Warn but don't fail — cost estimates have uncertainty.
            # Change to exit 1 to hard-gate deploys on budget.
          fi

      # ── Fallback: post a note when Azure auth was unavailable ──
      - name: Post skip notice
        if: steps.azure_login.outcome != 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          echo "::notice::Cost estimate skipped — Azure OIDC login was unavailable (transient)"
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "💰 **Infracost**: Cost estimate skipped — Azure OIDC login was unavailable (transient). Re-run the workflow to retry." \
            2>/dev/null || true
