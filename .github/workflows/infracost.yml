# ─────────────────────────────────────────────────────────────
# Infracost — Cost estimation for infrastructure changes
#
# This workflow is intentionally kept as a fast no-op on PRs.
# The previous live cost-estimation path was noisy and low-signal,
# so we preserve the check name for branch protection while avoiding
# external auth, usage collection, and comment churn.
# ─────────────────────────────────────────────────────────────
name: Infracost

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/tofu/**"

permissions:
  contents: read

jobs:
  infracost:
    name: Cost Estimate
    runs-on: ubuntu-latest
    steps:
      - name: Disabled cost estimate
        run: |
          echo "::notice::Infracost is disabled for PRs because the live estimate was noisy and low-signal."
          echo "::notice::The check remains as a fast no-op to keep branch protection satisfied."
