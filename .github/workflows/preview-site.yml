# ─────────────────────────────────────────────────────────────
# Preview Site — SWA staging environment for website-only PRs
#
# Deploys a staging environment on Azure Static Web Apps when
# a PR modifies files under website/.  The staging URL is posted
# as a PR comment.  On PR close, the staging environment is torn down.
#
# Required GitHub Secrets (from the 'dev' environment):
#   SWA_DEPLOYMENT_TOKEN — Static Web App deployment token
#   CIAM_CLIENT_ID       — CIAM app registration client ID
#   CIAM_AUTHORITY       — CIAM authority URL (e.g. https://<tenant>.ciamlogin.com/)
#   CIAM_TENANT_ID       — CIAM tenant ID
# ─────────────────────────────────────────────────────────────
name: Preview Site

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - "website/**"

permissions:
  contents: read
  pull-requests: write       # for posting preview URL comment

jobs:
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    if: github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    environment: dev
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Inject CIAM config
        env:
          CIAM_CLIENT_ID: ${{ secrets.CIAM_CLIENT_ID }}
          CIAM_AUTHORITY: ${{ secrets.CIAM_AUTHORITY }}
          CIAM_TENANT_ID: ${{ secrets.CIAM_TENANT_ID }}
        run: |
          if [ -n "$CIAM_CLIENT_ID" ] && [ -n "$CIAM_AUTHORITY" ]; then
            CIAM_JSON="{\"clientId\":\"${CIAM_CLIENT_ID}\",\"authority\":\"${CIAM_AUTHORITY}\",\"tenantId\":\"${CIAM_TENANT_ID}\"}"
            find website -name '*.html' -exec sed -i \
              's|{"clientId":"","authority":"","tenantId":""}|'"${CIAM_JSON}"'|' {} +
          else
            echo "::warning::CIAM secrets are not fully set; preview sign-in will remain disabled."
          fi

      - name: Deploy to SWA staging environment
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: /website
          skip_app_build: true
          deployment_environment: "pr-${{ github.event.pull_request.number }}"

  close-preview:
    name: Close Preview
    runs-on: ubuntu-latest
    if: github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    environment: dev
    steps:
      - name: Tear down staging environment
        uses: Azure/static-web-apps-deploy@1a947af9992250f3bc2e68ad0754c0b0c11566c9 # v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: close
          app_location: /website
          deployment_environment: "pr-${{ github.event.pull_request.number }}"
