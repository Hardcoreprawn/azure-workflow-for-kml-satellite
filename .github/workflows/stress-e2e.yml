# ---------------------------------------------------------------------------
# Stress E2E Pipeline Test (Issue #14)
# ---------------------------------------------------------------------------
# Manual workflow to validate >=20 concurrent uploads against the live dev
# environment. Uses OIDC (no static cloud credentials), resolves runtime
# endpoints dynamically, and runs the dedicated stress integration test.
# ---------------------------------------------------------------------------

name: Stress E2E Pipeline Test

on:
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

env:
  FUNCTION_APP_NAME: func-kmlsat-dev
  RESOURCE_GROUP: rg-kmlsat-dev

jobs:
  stress-e2e:
    name: Live Stress E2E (Dev)
    runs-on: ubuntu-latest
    environment: dev
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Resolve live environment values
        id: env
        shell: bash
        run: |
          set -euo pipefail

          fail() { echo "::error::$*"; exit 1; }

          HOSTNAME=$(az functionapp show \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query defaultHostName -o tsv)
          [[ -n "$HOSTNAME" ]] || fail "Could not resolve Function App hostname"

          STORAGE_ACCOUNT=$(az storage account list \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "[0].name" -o tsv)
          [[ -n "$STORAGE_ACCOUNT" ]] || fail "Could not resolve storage account name"
          STORAGE_URL="https://${STORAGE_ACCOUNT}.blob.core.windows.net"

          AZURE_SUBSCRIPTION_ID=$(az account show --query id -o tsv)
          RESOURCE_ID="/subscriptions/${AZURE_SUBSCRIPTION_ID}/resourceGroups/${{ env.RESOURCE_GROUP }}/providers/Microsoft.Web/sites/${{ env.FUNCTION_APP_NAME }}"

          STORAGE_CONNECTION_STRING=$(az functionapp config appsettings list \
            --name "${{ env.FUNCTION_APP_NAME }}" \
            --resource-group "${{ env.RESOURCE_GROUP }}" \
            --query "[?name=='AzureWebJobsStorage'].value | [0]" -o tsv)
          [[ -n "$STORAGE_CONNECTION_STRING" ]] || fail "Could not resolve AzureWebJobsStorage app setting"

          if [[ "$STORAGE_CONNECTION_STRING" != *"AccountKey="* ]]; then
            STORAGE_KEY=$(az storage account keys list \
              --account-name "$STORAGE_ACCOUNT" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "[0].value" -o tsv)
            [[ -n "$STORAGE_KEY" ]] || fail "Could not resolve storage account key for stress uploads"
            STORAGE_CONNECTION_STRING="DefaultEndpointsProtocol=https;AccountName=${STORAGE_ACCOUNT};AccountKey=${STORAGE_KEY};EndpointSuffix=core.windows.net"
          fi

          HOST_KEY=""
          KEY_PAYLOAD=$(az rest \
            --method post \
            --uri "https://management.azure.com${RESOURCE_ID}/host/default/listKeys?api-version=2024-04-01" \
            -o json 2>/dev/null || true)
          if [[ -n "$KEY_PAYLOAD" ]]; then
            HOST_KEY=$(echo "$KEY_PAYLOAD" | jq -r '.masterKey // empty')
          fi

          if [[ -z "$HOST_KEY" ]]; then
            HOST_KEY=$(az functionapp keys list \
              --name "${{ env.FUNCTION_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "masterKey" -o tsv)
          fi

          if [[ -z "$HOST_KEY" ]]; then
            HOST_KEY=$(az functionapp keys list \
              --name "${{ env.FUNCTION_APP_NAME }}" \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --query "functionKeys.default" -o tsv)
          fi
          [[ -n "$HOST_KEY" ]] || fail "Could not retrieve function host key"

          echo "hostname=${HOSTNAME}" >> "$GITHUB_OUTPUT"
          echo "storage_url=${STORAGE_URL}" >> "$GITHUB_OUTPUT"
          echo "::add-mask::${STORAGE_CONNECTION_STRING}"
          echo "storage_connection_string=${STORAGE_CONNECTION_STRING}" >> "$GITHUB_OUTPUT"
          echo "::add-mask::${HOST_KEY}"
          echo "host_key=${HOST_KEY}" >> "$GITHUB_OUTPUT"

      - name: Run concurrent stress test
        env:
          E2E_FUNCTION_APP_HOSTNAME: ${{ steps.env.outputs.hostname }}
          E2E_STORAGE_ACCOUNT_URL: ${{ steps.env.outputs.storage_url }}
          E2E_STORAGE_CONNECTION_STRING: ${{ steps.env.outputs.storage_connection_string }}
          E2E_FUNCTION_HOST_KEY: ${{ steps.env.outputs.host_key }}
        run: |
          set -euo pipefail
          uv run pytest tests/integration/test_stress_pipeline.py -m "e2e and slow" -v --tb=short --maxfail=1
