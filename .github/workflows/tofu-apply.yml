name: OpenTofu Apply

on:
  push:
    branches: [main]
    paths:
      - "infra/tofu/**"
      - ".github/workflows/tofu-apply.yml"
  workflow_dispatch:
    inputs:
      target_environment:
        description: Environment to apply
        required: true
        type: choice
        default: dev
        options:
          - dev
          - prd

permissions:
  id-token: write
  contents: read

jobs:
  apply-dev:
    name: Apply (dev)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'dev')
    environment: dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-flight Check (ARM API Access)
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Pre-flight Validation"

          # List all required secrets and fail if any are missing
          if [[ -z "${{ secrets.AZURE_CLIENT_ID }}" ]]; then
            echo "::error::Missing secret: AZURE_CLIENT_ID"
            exit 1
          fi
          if [[ -z "${{ secrets.AZURE_TENANT_ID }}" ]]; then
            echo "::error::Missing secret: AZURE_TENANT_ID"
            exit 1
          fi
          if [[ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]]; then
            echo "::error::Missing secret: AZURE_SUBSCRIPTION_ID"
            exit 1
          fi
          if [[ -z "${{ secrets.TF_STATE_RESOURCE_GROUP }}" ]]; then
            echo "::error::Missing secret: TF_STATE_RESOURCE_GROUP"
            exit 1
          fi
          if [[ -z "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" ]]; then
            echo "::error::Missing secret: TF_STATE_STORAGE_ACCOUNT"
            exit 1
          fi
          if [[ -z "${{ secrets.TF_STATE_CONTAINER_DEV }}" ]]; then
            echo "::error::Missing secret: TF_STATE_CONTAINER_DEV"
            exit 1
          fi
          if [[ -z "${{ secrets.TF_STATE_KEY_DEV }}" ]]; then
            echo "::error::Missing secret: TF_STATE_KEY_DEV"
            exit 1
          fi
          echo "✅ All required secrets are set"

          # Test 1: Verify subscription access
          echo "Testing subscription access..."
          CURRENT_SUBSCRIPTION=$(az account show --query id -o tsv)
          if [[ "$CURRENT_SUBSCRIPTION" != "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]]; then
            echo "::error::Logged in to wrong subscription. Expected ${{ secrets.AZURE_SUBSCRIPTION_ID }}, got $CURRENT_SUBSCRIPTION"
            exit 1
          fi
          echo "✅ Logged in to correct subscription: $CURRENT_SUBSCRIPTION"

          # Test 2: Verify state backend container with OIDC (data-plane auth)
          STATE_STORAGE="${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          STATE_CONTAINER="${{ secrets.TF_STATE_CONTAINER_DEV }}"

          # Test 3: Verify container exists in storage account
          echo "Checking Terraform state container..."
          if ! az storage container exists \
            --account-name "$STATE_STORAGE" \
            --name "$STATE_CONTAINER" \
            --auth-mode login \
            --query exists -o tsv | grep -q true; then
            echo "::error::Container '$STATE_CONTAINER' not found in storage account '$STATE_STORAGE'"
            exit 1
          fi
          echo "✅ Terraform state container exists: $STATE_CONTAINER"

          echo "::endgroup::"
          echo "✅ All pre-flight checks passed. Ready to proceed with OpenTofu."

      - name: OpenTofu Init
        working-directory: infra/tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          tofu init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER_DEV }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY_DEV }}"

      - name: OpenTofu Plan
        working-directory: infra/tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          tofu plan \
            -input=false \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var-file="environments/dev.tfvars" \
            -out="dev.tfplan"

      - name: OpenTofu Apply
        working-directory: infra/tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          tofu apply -input=false -auto-approve "dev.tfplan"

  smoke-test-dev:
    name: Smoke Test (dev)
    runs-on: ubuntu-latest
    needs: apply-dev
    environment: dev

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Function App URL
        id: get-url
        run: |
          FUNCTION_URL=$(az functionapp show \
            --resource-group rg-kmlsat-dev \
            --name func-kmlsat-dev \
            --query "defaultHostName" -o tsv)
          echo "function_url=https://${FUNCTION_URL}" >> $GITHUB_OUTPUT

      - name: Test Health Endpoint
        run: |
          echo "Testing health endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ steps.get-url.outputs.function_url }}/api/health")
          if [ "$response" != "200" ]; then
            echo "❌ Health check failed with status $response"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Test Readiness Endpoint
        run: |
          echo "Testing readiness endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ steps.get-url.outputs.function_url }}/api/readiness")
          if [ "$response" != "200" ]; then
            echo "❌ Readiness check failed with status $response"
            exit 1
          fi
          echo "✅ Readiness check passed"

      - name: Verify Event Grid Subscription
        run: |
          echo "Verifying Event Grid subscription exists..."
          az eventgrid system-topic event-subscription show \
            --name evgs-kml-upload \
            --system-topic-name evgt-kmlsat-dev \
            --resource-group rg-kmlsat-dev \
            --query "provisioningState" -o tsv | grep -q "Succeeded"
          echo "✅ Event Grid subscription verified"

  apply-prd:
    name: Apply (prd)
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target_environment == 'prd'
    environment: prd

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: 1.8.8

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Pre-flight Check (ARM API Access)
        shell: bash
        run: |
          set -euo pipefail
          echo "::group::Pre-flight Validation"

          # List all required secrets and fail if any are missing
          if [[ -z "${{ secrets.AZURE_CLIENT_ID }}" ]]; then
            echo "::error::Missing secret: AZURE_CLIENT_ID"
            exit 1
          fi
          if [[ -z "${{ secrets.AZURE_TENANT_ID }}" ]]; then
            echo "::error::Missing secret: AZURE_TENANT_ID"
            exit 1
          fi
          if [[ -z "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]]; then
            echo "::error::Missing secret: AZURE_SUBSCRIPTION_ID"
            exit 1
          fi
          if [[ -z "${{ secrets.TF_STATE_RESOURCE_GROUP }}" ]]; then
            echo "::error::Missing secret: TF_STATE_RESOURCE_GROUP"
            exit 1
          fi
          if [[ -z "${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" ]]; then
            echo "::error::Missing secret: TF_STATE_STORAGE_ACCOUNT"
            exit 1
          fi
          if [[ -z "${{ secrets.TF_STATE_CONTAINER_PRD }}" ]]; then
            echo "::error::Missing secret: TF_STATE_CONTAINER_PRD"
            exit 1
          fi
          if [[ -z "${{ secrets.TF_STATE_KEY_PRD }}" ]]; then
            echo "::error::Missing secret: TF_STATE_KEY_PRD"
            exit 1
          fi
          echo "✅ All required secrets are set"

          # Test 1: Verify subscription access
          echo "Testing subscription access..."
          CURRENT_SUBSCRIPTION=$(az account show --query id -o tsv)
          if [[ "$CURRENT_SUBSCRIPTION" != "${{ secrets.AZURE_SUBSCRIPTION_ID }}" ]]; then
            echo "::error::Logged in to wrong subscription. Expected ${{ secrets.AZURE_SUBSCRIPTION_ID }}, got $CURRENT_SUBSCRIPTION"
            exit 1
          fi
          echo "✅ Logged in to correct subscription: $CURRENT_SUBSCRIPTION"

          # Test 2: Verify state backend container with OIDC (data-plane auth)
          STATE_STORAGE="${{ secrets.TF_STATE_STORAGE_ACCOUNT }}"
          STATE_CONTAINER="${{ secrets.TF_STATE_CONTAINER_PRD }}"

          # Test 3: Verify container exists in storage account
          echo "Checking Terraform state container..."
          if ! az storage container exists \
            --account-name "$STATE_STORAGE" \
            --name "$STATE_CONTAINER" \
            --auth-mode login \
            --query exists -o tsv | grep -q true; then
            echo "::error::Container '$STATE_CONTAINER' not found in storage account '$STATE_STORAGE'"
            exit 1
          fi
          echo "✅ Terraform state container exists: $STATE_CONTAINER"

          echo "::endgroup::"
          echo "✅ All pre-flight checks passed. Ready to proceed with OpenTofu."

      - name: OpenTofu Init
        working-directory: infra/tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          tofu init \
            -backend-config="resource_group_name=${{ secrets.TF_STATE_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ secrets.TF_STATE_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ secrets.TF_STATE_CONTAINER_PRD }}" \
            -backend-config="key=${{ secrets.TF_STATE_KEY_PRD }}"

      - name: OpenTofu Plan
        working-directory: infra/tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          tofu plan \
            -input=false \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -var-file="environments/prd.tfvars" \
            -out="prd.tfplan"

      - name: OpenTofu Apply
        working-directory: infra/tofu
        env:
          ARM_USE_OIDC: "true"
          ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail
          tofu apply -input=false -auto-approve "prd.tfplan"

  smoke-test-prd:
    name: Smoke Test (prd)
    runs-on: ubuntu-latest
    needs: apply-prd
    environment: prd

    steps:
      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get Function App URL
        id: get-url
        run: |
          FUNCTION_URL=$(az functionapp show \
            --resource-group rg-kmlsat-prd \
            --name func-kmlsat-prd \
            --query "defaultHostName" -o tsv)
          echo "function_url=https://${FUNCTION_URL}" >> $GITHUB_OUTPUT

      - name: Test Health Endpoint
        run: |
          echo "Testing health endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ steps.get-url.outputs.function_url }}/api/health")
          if [ "$response" != "200" ]; then
            echo "❌ Health check failed with status $response"
            exit 1
          fi
          echo "✅ Health check passed"

      - name: Test Readiness Endpoint
        run: |
          echo "Testing readiness endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ steps.get-url.outputs.function_url }}/api/readiness")
          if [ "$response" != "200" ]; then
            echo "❌ Readiness check failed with status $response"
            exit 1
          fi
          echo "✅ Readiness check passed"

      - name: Verify Event Grid Subscription
        run: |
          echo "Verifying Event Grid subscription exists..."
          az eventgrid system-topic event-subscription show \
            --name evgs-kml-upload \
            --system-topic-name evgt-kmlsat-prd \
            --resource-group rg-kmlsat-prd \
            --query "provisioningState" -o tsv | grep -q "Succeeded"
          echo "✅ Event Grid subscription verified"
