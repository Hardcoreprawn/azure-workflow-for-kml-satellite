# Pre-commit hooks — run automatically on every commit.
# Install with: uv run pre-commit install
# Run manually: uv run pre-commit run --all-files

repos:
  # ---------------------------------------------------------------------------
  # General file hygiene
  # ---------------------------------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: no-commit-to-branch
        args: [--branch, main]
        # Remove this hook or use --no-verify for initial setup commits.
        # In normal workflow, all changes go through PRs.

  # ---------------------------------------------------------------------------
  # Python — Ruff (lint + format)
  # Use the same uv-managed Ruff binary as CI to avoid local/remote drift.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, pyi]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi]

  # ---------------------------------------------------------------------------
  # Python — Type checking (pyright)
  # Runs from the local venv so it sees all installed dependencies.
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: pyright
        name: pyright
        entry: uv run pyright
        language: system
        types: [python]
        pass_filenames: false

  # ---------------------------------------------------------------------------
  # Security — check for secrets/credentials
  # ---------------------------------------------------------------------------
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        exclude: \.lock$|local\.settings\.json\.template$

  # ---------------------------------------------------------------------------
  # Bicep — lint infrastructure templates
  # Uses the standalone Bicep CLI. Catches unused params, hardcoded URLs,
  # missing descriptions, and other best-practice violations.
  # Install: winget install Microsoft.Bicep (Windows) or via az bicep install
  # CI uses: az bicep install (bundled with azure-cli)
  # ---------------------------------------------------------------------------
  - repo: local
    hooks:
      - id: bicep-lint
        name: bicep lint
        entry: python -c "import subprocess,sys;r=[subprocess.run(['bicep','lint',f]) for f in sys.argv[1:]];sys.exit(1 if any(p.returncode for p in r) else 0)"
        language: system
        files: \.bicep$
        exclude: \.bicepparam$

  # ---------------------------------------------------------------------------
  # GitHub Actions — workflow linting
  # Uses actionlint (Go binary, auto-installed by pre-commit).
  # Catches invalid workflow syntax, unknown action inputs, type errors
  # in expressions, incorrect glob patterns, and more.
  # https://github.com/rhysd/actionlint
  # ---------------------------------------------------------------------------
  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint

  # ---------------------------------------------------------------------------
  # Markdown
  # ---------------------------------------------------------------------------
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: [--fix]
