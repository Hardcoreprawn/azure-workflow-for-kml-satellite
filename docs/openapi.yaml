openapi: "3.1.0"
info:
  title: Canopex API
  version: "1.0.0"
  description: |
    Canopex — satellite imagery analysis platform. Upload a KML boundary,
    get automated NDVI change detection, weather correlation and AI-generated
    insights for conservation, agriculture and ESG compliance use cases.

    ## Authentication

    Most endpoints require CIAM bearer-token authentication.
    Clients obtain a JWT and send `Authorization: Bearer <token>` on API requests.

    Demo artifact downloads use short-lived **valet tokens** instead of auth sessions.

    Health and contract endpoints are unauthenticated.

    ## Rate Limits

    Certain endpoints enforce per-IP sliding-window rate limits.  When exceeded
    the API returns `429 Too Many Requests`.

    | Scope         | Limit        | Applies to                     |
    |---------------|-------------|--------------------------------|
    | Contact form  | 5 / 60 s   | `/api/contact-form`            |
    | Pipeline poll | 30 / 60 s  | `/api/orchestrator/{id}`       |
    | CORS proxy    | 60 / 60 s  | `/api/proxy`                   |

    ## Pipeline Quota (Free Tier)

    Each user may execute up to **5 pipeline runs**. Exceeding this returns
    `403 Forbidden` with a quota-exhausted message.
  contact:
    name: Canopex
    url: https://github.com/Hardcoreprawn/azure-workflow-for-kml-satellite
  license:
    name: MIT
    identifier: MIT

servers:
  - url: https://{productionHost}/api
    description: Production (Orchestrator Function App ingress)
    variables:
      productionHost:
        default: api.canopex.com
        description: Production API ingress hostname
  - url: https://{developmentHost}/api
    description: Development (Orchestrator Function App ingress)
    variables:
      developmentHost:
        default: func-kmlsat-dev-orch.jollysea-48e72cf8.uksouth.azurecontainerapps.io
        description: Development API ingress hostname
  - url: http://localhost:7071/api
    description: Local development

tags:
  - name: health
    description: Health and readiness probes
  - name: demo
    description: Demo pipeline submission and artifact retrieval
  - name: pipeline
    description: Pipeline orchestration and status
  - name: analysis
    description: AI-powered satellite analysis
  - name: export
    description: Data export (GeoJSON, CSV)
  - name: contact
    description: Contact form
  - name: auth
    description: Bearer token authentication and identity
  - name: billing
    description: Stripe billing and subscriptions
  - name: org
    description: Organisation management
  - name: ops
    description: Operator administration
  - name: catalogue
    description: Temporal acquisition catalogue and time-series browsing

paths:
  # ── Health ────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      summary: Liveness probe
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: healthy
                  version:
                    type: string
                    description: Application version from pyproject.toml
                    example: "1.0.0"
                  commit:
                    type: string
                    description: Git commit SHA of the deployed image
                    example: "a1b2c3d"  # pragma: allowlist secret
                required: [status, version, commit]

  /readiness:
    get:
      operationId: getReadiness
      summary: Readiness probe
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is ready to accept requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  api_version:
                    type: string
                    example: "2026-03-15.1"
                  version:
                    type: string
                    description: Application version from pyproject.toml
                    example: "1.0.0"
                  commit:
                    type: string
                    description: Git commit SHA of the deployed image
                    example: "a1b2c3d"  # pragma: allowlist secret
                required: [status, api_version, version, commit]

  /contract:
    get:
      operationId: getContract
      summary: API version contract
      tags: [health]
      security: []
      responses:
        "200":
          description: API contract metadata
          content:
            application/json:
              schema:
                type: object
                properties:
                  api_version:
                    type: string
                    example: v1
                required: [api_version]

  # ── Submission ────────────────────────────────────────────
  /analysis/submit:
    post:
      operationId: queueAnalysis
      summary: Submit a KML for signed-in analysis processing
      description: |
        Accepts raw KML text, uploads it to blob storage and triggers
        the analysis pipeline.

        Every pipeline submission requires a valid Authorization header.
        Signed-in users participate in quota/history accounting, and free-tier
        accounts are routed through the cheaper seasonal two-year pipeline.
      tags: [analysis]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                kml_content:
                  type: string
                  description: Raw KML/KMZ XML content
                submission_context:
                  type: object
                  description: Optional signed-in submission metadata for analysis history
              required: [kml_content]
      responses:
        "202":
          description: Pipeline started
          content:
            application/json:
              schema:
                type: object
                properties:
                  instance_id:
                    type: string
                    description: Durable Functions orchestration instance ID
                  submission_prefix:
                    type: string
                    example: analysis
                required: [instance_id, submission_prefix]
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/QuotaExhausted"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "502":
          description: Upstream storage or orchestration startup is temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /demo-valet-tokens:
    post:
      operationId: demoValetTokens
      summary: Generate valet tokens for artifact download
      description: |
        Creates short-lived HMAC-signed tokens that grant access
        to specific pipeline output artifacts.  Requires function-level
        authentication (Azure Functions host key).
      tags: [demo]
      security:
        - functionKey: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                submission_id:
                  type: string
                artifact_paths:
                  type: array
                  items:
                    type: string
              required: [submission_id, artifact_paths]
      responses:
        "200":
          description: Valet tokens generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      type: object
                      properties:
                        artifact_path:
                          type: string
                        token:
                          type: string
                        expires_at:
                          type: string
                          format: date-time
                required: [tokens]
        "400":
          $ref: "#/components/responses/BadRequest"

  /demo-artifacts:
    get:
      operationId: demoArtifacts
      summary: Download a pipeline artifact using a valet token
      description: |
        Retrieves a specific artifact (imagery, GeoJSON, etc.) using a
        short-lived valet token.  No JWT required.
      tags: [demo]
      security:
        - valetToken: []
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: HMAC-signed valet token
      responses:
        "200":
          description: Artifact content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/BadRequest"
        "403":
          description: Token invalid, expired, or replay detected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Pipeline ──────────────────────────────────────────────
  /orchestrator/{instance_id}:
    get:
      operationId: getOrchestratorStatus
      summary: Poll pipeline orchestration status
      description: |
        Returns the current status of a Durable Functions orchestration,
        including progress updates and final output when complete.
      tags: [pipeline]
      security: []
      parameters:
        - $ref: "#/components/parameters/instanceId"
      responses:
        "200":
          description: Orchestration status
          content:
            application/json:
              schema:
                type: object
                properties:
                  runtimeStatus:
                    type: string
                    enum: [Running, Completed, Failed, Terminated, Pending]
                  custom_status:
                    type: object
                    description: Progress information (step, percentage, message)
                  output:
                    description: Final pipeline output (present when Completed)
                    $ref: "#/components/schemas/PipelineSummary"
                required: [runtimeStatus]
        "404":
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  /timelapse-data/{instance_id}:
    get:
      operationId: getTimelapseData
      summary: Retrieve timelapse imagery data for a pipeline run
      tags: [pipeline]
      parameters:
        - $ref: "#/components/parameters/instanceId"
      responses:
        "200":
          description: Timelapse data with imagery URLs and metadata
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Instance not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Analysis ──────────────────────────────────────────────
  /frame-analysis:
    post:
      operationId: frameAnalysis
      summary: AI analysis of a single imagery frame
      description: |
        Sends NDVI, weather, and imagery metadata to Azure AI Foundry
        for single-frame analysis.  Returns structured observations,
        a severity score, and plain-English summary.
      tags: [analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Frame context (NDVI stats, weather, metadata)
        description: Maximum body size 32 KiB
      responses:
        "200":
          description: Analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Payload too large (> 32 KiB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /timelapse-analysis:
    post:
      operationId: timelapseAnalysis
      summary: AI analysis of a temporal imagery series
      description: |
        Analyses NDVI trends over time, correlates with weather data,
        and generates a narrative summary of change detection findings.
      tags: [analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Timelapse context (multi-frame NDVI, weather series)
        description: Maximum body size 32 KiB
      responses:
        "200":
          description: Timelapse analysis result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "413":
          description: Payload too large (> 32 KiB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /timelapse-analysis-save:
    post:
      operationId: timelapseAnalysisSave
      summary: Persist a timelapse analysis result
      description: |
        Saves a completed analysis to blob storage for later retrieval.
        Maximum body size 128 KiB.
      tags: [analysis]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Analysis saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved:
                    type: boolean
                    example: true
                  path:
                    type: string
                    example: analysis/abc123/timelapse_analysis.json
        "400":
          description: Missing or invalid fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller does not own this run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Run not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "413":
          description: Payload too large (> 128 KiB)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Cosmos DB temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /timelapse-analysis-load/{instance_id}:
    get:
      operationId: timelapseAnalysisLoad
      summary: Load a previously saved timelapse analysis
      tags: [analysis]
      parameters:
        - $ref: "#/components/parameters/instanceId"
      responses:
        "200":
          description: Previously saved analysis
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalysisResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Caller does not own this run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Run or analysis not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
          description: Cosmos DB temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Export ────────────────────────────────────────────────
  /export/{instance_id}/{format}:
    get:
      operationId: exportData
      summary: Export pipeline results
      description: |
        Downloads pipeline output in the specified format.
      tags: [export]
      parameters:
        - $ref: "#/components/parameters/instanceId"
        - name: format
          in: path
          required: true
          schema:
            type: string
            enum: [geojson, csv]
          description: Export format
      responses:
        "200":
          description: Exported data
          content:
            application/geo+json:
              schema:
                type: object
                description: GeoJSON FeatureCollection
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Instance or data not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Contact ───────────────────────────────────────────────
  /contact-form:
    post:
      operationId: submitContactForm
      summary: Submit the website contact form
      tags: [contact]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                  format: email
                message:
                  type: string
              required: [name, email, message]
      responses:
        "200":
          description: Message received
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: received
        "400":
          $ref: "#/components/responses/BadRequest"
        "429":
          $ref: "#/components/responses/TooManyRequests"

  # ── Proxy ─────────────────────────────────────────────────
  /proxy:
    get:
      operationId: corsProxy
      summary: CORS proxy for third-party APIs
      description: |
        Proxies GET requests to allowed third-party APIs (e.g. Open-Meteo,
        FIRMS fire data) to work around browser CORS restrictions.
        Response size capped at 5 MiB.
      tags: [demo]
      security: []
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
            format: uri
          description: Target URL to proxy (must match allowlist)
      responses:
        "200":
          description: Proxied response
          content:
            application/json:
              schema:
                type: object
        "400":
          description: URL not on allowlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "429":
          $ref: "#/components/responses/TooManyRequests"
        "502":
          description: Upstream error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Monitoring ──────────────────────────────────────────────
  /monitoring:
    get:
      operationId: listMonitors
      summary: List monitoring subscriptions
      description: Returns all scheduled monitors for the authenticated user.
      tags: [monitoring]
      responses:
        "200":
          description: List of monitors
          content:
            application/json:
              schema:
                type: object
                properties:
                  monitors:
                    type: array
                    items:
                      $ref: "#/components/schemas/Monitor"
                  count:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createMonitor
      summary: Create a monitoring subscription
      description: |
        Subscribe an AOI to scheduled NDVI change detection.
        Requires Pro tier or higher. The system will re-run analysis on
        the configured cadence and send email alerts when thresholds are
        breached.
      tags: [monitoring]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [aoi_name, aoi_geometry]
              properties:
                aoi_name:
                  type: string
                aoi_geometry:
                  type: object
                  description: AOI geometry with centroid, bbox, exterior_coords
                cadence_days:
                  type: integer
                  minimum: 1
                  maximum: 365
                  default: 30
                alert_thresholds:
                  $ref: "#/components/schemas/AlertThresholds"
                source_file:
                  type: string
                baseline_run_id:
                  type: string
      responses:
        "201":
          description: Monitor created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Tier insufficient or monitor limit reached

  /monitoring/{monitor_id}:
    parameters:
      - name: monitor_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getMonitor
      summary: Get monitor details
      tags: [monitoring]
      responses:
        "200":
          description: Monitor detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
        "404":
          description: Monitor not found
    patch:
      operationId: updateMonitor
      summary: Update monitor settings
      tags: [monitoring]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                cadence_days:
                  type: integer
                enabled:
                  type: boolean
                alert_thresholds:
                  $ref: "#/components/schemas/AlertThresholds"
      responses:
        "200":
          description: Updated monitor
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Monitor"
    delete:
      operationId: deleteMonitor
      summary: Delete a monitor
      tags: [monitoring]
      responses:
        "200":
          description: Monitor deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deleted:
                    type: boolean

  # ── Catalogue ─────────────────────────────────────────────

  /catalogue:
    get:
      operationId: catalogueList
      tags: [catalogue]
      summary: List catalogue entries
      description: |
        Returns paginated acquisition catalogue entries for the authenticated
        user. Supports filtering by AOI name, status, date range, and provider.
      parameters:
        - name: aoiName
          in: query
          schema:
            type: string
          description: Filter by AOI name (substring match, case-insensitive)
        - name: status
          in: query
          schema:
            type: string
            enum: [completed, partial, failed]
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date-time
          description: Filter entries submitted on or after this ISO-8601 date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date-time
          description: Filter entries submitted on or before this ISO-8601 date
        - name: provider
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            maximum: 10000
            default: 0
        - name: sort
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
          description: Sort direction by submission date
      responses:
        "200":
          description: Paginated catalogue entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogueListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /catalogue/{entryId}:
    get:
      operationId: catalogueDetail
      tags: [catalogue]
      summary: Get a single catalogue entry
      parameters:
        - name: entryId
          in: path
          required: true
          schema:
            type: string
          description: "Catalogue entry id ({runId}:{aoiSlug})"
      responses:
        "200":
          description: Catalogue entry detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogueEntryResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /catalogue/run/{runId}:
    get:
      operationId: catalogueByRun
      tags: [catalogue]
      summary: List catalogue entries for a pipeline run
      parameters:
        - name: runId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: All catalogue entries for the run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogueListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /catalogue/aoi/{aoiName}:
    get:
      operationId: catalogueByAoi
      tags: [catalogue]
      summary: Acquisition history for a specific AOI (time-series)
      parameters:
        - name: aoiName
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        "200":
          description: Time-series of acquisitions for the AOI
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CatalogueListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /billing/status:
    get:
      operationId: billingStatus
      tags: [billing]
      summary: Current subscription status for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Billing status
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /billing/checkout:
    post:
      operationId: billingCheckout
      tags: [billing]
      summary: Create a Stripe Checkout session
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                tier:
                  type: string
      responses:
        "200":
          description: Checkout session URL
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /billing/portal:
    post:
      operationId: billingPortal
      tags: [billing]
      summary: Create a Stripe customer portal session
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Portal session URL
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /billing/webhook:
    post:
      operationId: billingWebhook
      tags: [billing]
      summary: Handle Stripe webhook events
      responses:
        "200":
          description: Webhook processed

  /upload/token:
    post:
      operationId: uploadToken
      tags: [pipeline]
      summary: Generate a write-only SAS token for blob upload
      security:
        - bearerAuth: []
      responses:
        "200":
          description: SAS token and upload URL
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /upload/status/{submission_id}:
    get:
      operationId: uploadStatus
      tags: [pipeline]
      summary: Pipeline submission status
      parameters:
        - name: submission_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Submission status
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Submission not found

  /analysis/notes:
    post:
      operationId: analysisNotes
      summary: Save or delete a parcel note on a run
      description: |
        Saves a text note against a specific parcel (identified by parcel_key) within a
        completed run. Passing an empty string for `note` deletes the existing note.
        The caller must be the run owner or an org member.
        Notes are stored in Cosmos and included in EUDR PDF exports.
      tags: [analysis]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instance_id, parcel_key]
              properties:
                instance_id:
                  type: string
                parcel_key:
                  type: string
                  description: Parcel AOI index (e.g. "0") or name
                note:
                  type: string
                  maxLength: 2000
      responses:
        "200":
          description: Note saved
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved: {type: boolean}
                  parcel_key: {type: string}
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — caller is not the owner or an org member
        "404":
          description: Run not found

  /analysis/override:
    post:
      operationId: analysisOverride
      summary: Record or revert a human determination override on a parcel
      description: |
        Overrides the algorithmic determination for a specific parcel to "compliant"
        with a mandatory audit-trail reason (min 20 characters).
        Set `revert: true` to remove an existing override and restore the original
        algorithmic determination.
        The caller must be the run owner or an org member.
      tags: [analysis]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instance_id, parcel_key]
              properties:
                instance_id:
                  type: string
                parcel_key:
                  type: string
                reason:
                  type: string
                  minLength: 20
                  maxLength: 1000
                  description: Required when revert is false
                revert:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Override saved or reverted
          content:
            application/json:
              schema:
                type: object
                properties:
                  saved: {type: boolean}
                  parcel_key: {type: string}
                  reverted: {type: boolean}
        "400":
          description: Reason too short or missing required fields
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          description: Forbidden — caller is not the owner or an org member
        "404":
          description: Run not found

  /analysis/history:
    get:
      operationId: analysisHistory
      tags: [analysis]
      summary: User or org-scoped analysis run history
      security:
        - bearerAuth: []
      parameters:
        - name: scope
          in: query
          required: false
          description: History scope (`user` default, `org` aggregates org member runs)
          schema:
            type: string
            enum: [user, org]
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            maximum: 200
      responses:
        "200":
          description: List of past analysis runs with optional portfolio stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  runs:
                    type: array
                    items:
                      type: object
                  activeRun:
                    type: object
                    nullable: true
                  offset:
                    type: integer
                  limit:
                    type: integer
                  scope:
                    type: string
                  orgId:
                    type: string
                    nullable: true
                  memberCount:
                    type: integer
                  stats:
                    type: object
                    properties:
                      totalRuns:
                        type: integer
                      activeRuns:
                        type: integer
                      completedRuns:
                        type: integer
                      failedRuns:
                        type: integer
                      totalParcels:
                        type: integer
                      lastSubmittedAt:
                        type: string
        "401":
          $ref: "#/components/responses/Unauthorized"

  /eudr-assessment:
    post:
      operationId: eudrAssessment
      tags: [analysis]
      summary: EUDR compliance assessment (NDVI + WorldCover + WDPA)
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: EUDR assessment result
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid input
        "401":
          $ref: "#/components/responses/Unauthorized"

  /convert-coordinates:
    post:
      operationId: convertCoordinates
      tags: [analysis]
      summary: Convert lat/lon coordinates to KML
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: KML content
          content:
            application/json:
              schema:
                type: object
        "400":
          description: Invalid coordinates
        "401":
          $ref: "#/components/responses/Unauthorized"

  /org:
    get:
      operationId: orgGet
      tags: [org]
      summary: Get organisation details
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Organisation info
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: orgCreate
      tags: [org]
      summary: Create an organisation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Created organisation
          content:
            application/json:
              schema:
                type: object
        "401":
          $ref: "#/components/responses/Unauthorized"

  /ops/dashboard:
    get:
      operationId: opsDashboard
      tags: [ops]
      summary: Ops dashboard (admin only)
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                type: object
        "403":
          description: Forbidden — admin role required

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        CIAM-issued bearer JWT sent in `Authorization: Bearer <token>`.
        The API verifies token signature and claims via OIDC/JWKS.
    functionKey:
      type: apiKey
      in: header
      name: x-functions-key
      description: Azure Functions host key
    valetToken:
      type: apiKey
      in: query
      name: token
      description: Short-lived HMAC-signed valet token

  parameters:
    instanceId:
      name: instance_id
      in: path
      required: true
      schema:
        type: string
      description: Durable Functions orchestration instance ID

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
      required: [error]

    AlertThresholds:
      type: object
      properties:
        loss_pct:
          type: number
          description: Vegetation loss % that triggers an alert
          default: 5.0
        gain_pct:
          type: number
          nullable: true
          description: Vegetation gain % that triggers an alert
        ndvi_mean_drop:
          type: number
          description: Mean NDVI decrease that triggers an alert
          default: 0.1

    Monitor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
        aoi_name:
          type: string
        source_file:
          type: string
        aoi_geometry:
          type: object
        enabled:
          type: boolean
        cadence_days:
          type: integer
        next_check_at:
          type: string
          format: date-time
        baseline_run_id:
          type: string
          nullable: true
        baseline_ndvi_mean:
          type: number
          nullable: true
          description: Baseline NDVI mean value at monitor creation
        last_run_id:
          type: string
          nullable: true
        last_run_at:
          type: string
          format: date-time
          nullable: true
        alert_thresholds:
          $ref: "#/components/schemas/AlertThresholds"
        alert_email:
          type: string
        alert_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AnalysisResult:
      type: object
      properties:
        observations:
          type: array
          items:
            $ref: "#/components/schemas/Observation"
        summary:
          type: string
          description: 2-3 sentence plain-English summary
        score:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Overall health score (0 = critical, 1 = healthy)
        key_finding:
          type: string
          description: Single most important finding (timelapse only)
      required: [observations, summary, score]

    Observation:
      type: object
      properties:
        category:
          type: string
          enum: [vegetation_health, water, clearing, anomaly, trend]
        severity:
          type: string
          enum: [critical, high, moderate, low, normal]
        description:
          type: string
        recommendation:
          type: string
      required: [category, severity, description, recommendation]

    PipelineSummary:
      type: object
      description: Aggregated pipeline output when orchestration completes
      properties:
        status:
          type: string
          enum: [success, partial, failed]
        features_parsed:
          type: integer
        aois_prepared:
          type: integer
        scenes_found:
          type: integer
        downloads_completed:
          type: integer
        enrichment_manifest:
          type: string
          description: Blob path to the enrichment manifest JSON

    CatalogueEntryResponse:
      type: object
      description: A single acquisition catalogue entry (camelCase API contract)
      properties:
        id:
          type: string
          description: "Deterministic id: {runId}:{aoiSlug}"
        runId:
          type: string
        aoiName:
          type: string
        sourceFile:
          type: string
        provider:
          type: string
        centroid:
          type: array
          items:
            type: number
          description: "[lon, lat]"
        bbox:
          type: array
          items:
            type: number
          description: "[minLon, minLat, maxLon, maxLat]"
        areaHa:
          type: number
        acquiredAt:
          type: string
          format: date-time
          nullable: true
        submittedAt:
          type: string
          format: date-time
          nullable: true
        cloudCoverPct:
          type: number
          nullable: true
        spatialResolutionM:
          type: number
          nullable: true
        collection:
          type: string
        status:
          type: string
          enum: [pending, completed, partial, failed]
        ndviMean:
          type: number
          nullable: true
        ndviMin:
          type: number
          nullable: true
        ndviMax:
          type: number
          nullable: true
        changeLossPct:
          type: number
          nullable: true
        changeGainPct:
          type: number
          nullable: true
        changeMeanDelta:
          type: number
          nullable: true
        imageryBlobPath:
          type: string
        metadataBlobPath:
          type: string
        enrichmentManifestPath:
          type: string
        createdAt:
          type: string
          format: date-time
          nullable: true
        updatedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, runId, aoiName, status]

    CatalogueListResponse:
      type: object
      description: Paginated list of catalogue entries
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/CatalogueEntryResponse"
        total:
          type: integer
          description: Total number of matching entries
        offset:
          type: integer
        limit:
          type: integer
        hasMore:
          type: boolean
      required: [entries, total, offset, limit, hasMore]

  responses:
    BadRequest:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    QuotaExhausted:
      description: Free tier quota exhausted (5 pipeline runs)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Free quota exhausted (5 pipeline runs). Please upgrade to continue."
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          example:
            error: "Rate limit exceeded. Try again later."

security:
  - bearerAuth: []
